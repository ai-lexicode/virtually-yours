# .clawguard.yaml — project configuration
# Base: generated by install.sh | Extended by module setup.sh scripts
# Secrets: NEVER store in this file — use env vars or .env (gitignored)

version: 1

clawguard:
  profile: "controlled"
  modules: [flow, gov]

project:
  name: "virtualy-yours"
  type: ["unknown"]

git:
  auto_push: false
  ship: pr

standards:
  test_coverage: 80

# --- Flow module namespace (managed by flow setup.sh) ---

flow:
  self_healing:
    mode: "off"                     # "active" | "dry-run" | "off" (MUST quote — YAML 1.1 bool)
    categories:
      formatting: true              # prettier, eslint --fix, black
      import_sorting: true          # isort, eslint import plugin
      missing_deps: true            # npm install, pip install, uv add
      known_issue_match: true       # Layer 1: match against known-issues.yaml
    max_retries: 1                  # retry count after auto-fix (1 = try once)
  autopilot:
    enabled: false
    max_budget_usd: 5
    scan_interval_seconds: 300
    allowed_tools: "Edit Write Read Grep Glob Bash(npm:*) Bash(git:*) Bash(node:*)"
    permission_mode: "dontAsk"
