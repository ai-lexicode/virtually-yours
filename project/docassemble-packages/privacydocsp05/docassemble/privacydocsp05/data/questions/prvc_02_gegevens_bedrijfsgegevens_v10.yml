mandatory: True
event: bg_tasksendurl
code: |
  if welkedocs_prvc:
    send_email(to=user_info().email,
      template=send_url
    )
  log("bg_tasksendurl afgerond.")
  background_response()
---
template: send_url
subject: |
  Link naar vragenlijst privacydocumenten
content: |
  Hi!
  
  Je bent zojuist gestart met de online vragenlijst voor privacydocumenten.
  
  Wil je op een later moment verdergaan met de vragenlijst of de door jou gegeven antwoorden nogmaals bekijken? Klik dan op deze 
  [link](${ interview_url() }). Mogelijk moet je eerst weer opnieuw inloggen.
  
  ------

  <u>Technische gegegevens</u><br>
  User: *${ user_info().email }*<br>
  Bedrijf: *${ bedrijfsnaam_client }*<br>
  Versie vragenlijst: *${ version_prvc }*
