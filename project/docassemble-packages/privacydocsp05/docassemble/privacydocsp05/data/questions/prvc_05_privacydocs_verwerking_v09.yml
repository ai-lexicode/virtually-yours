#-----------------------------------------------------------------------------
# SECTIE VERWERKING PERSOONSGEGEVENS
#-----------------------------------------------------------------------------
id: id_verwerking
mandatory: True
question: |
  Verwerking persoonsgegevens
subquestion: |
  <div style="
    display:block;
    padding:16px;
    border:1px solid #e5e7eb;
    border-radius:12px;
    background:#f6efe7;
    color:#000000;
    box-shadow:0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
  ">
    Deze sectie gaat over de verwerking van persoonsgegevens. De definities van “persoonsgegevens” en van "verwerking" staan in artikel 4 van de AVG:
    <br><br>
    <ol>
    <li> <u>persoonsgegevens</u>:
    <br>
    alle informatie over een geïdentificeerde of identificeerbare {natuurlijke persoon} („{de betrokkene}”); 
    als identificeerbaar wordt beschouwd een natuurlijke persoon die direct of indirect kan worden geïdentificeerd, 
    met name aan de hand van een identificator zoals een naam, een identificatienummer, locatiegegevens, een online identificator 
    of van een of meer elementen die kenmerkend zijn voor de fysieke, fysiologische, genetische, psychische, economische, culturele of 
    sociale identiteit van die natuurlijke persoon;
    <br>
    <br>
    <li> <u>verwerking</u>:
    <br>
    een bewerking of een geheel van bewerkingen met betrekking tot persoonsgegevens of een geheel van persoonsgegevens, 
    al dan niet uitgevoerd via geautomatiseerde procedés, zoals het verzamelen, vastleggen, ordenen, structureren, opslaan, bijwerken of 
    wijzigen, opvragen, raadplegen, gebruiken, verstrekken door middel van doorzending, verspreiden of 
    op andere wijze ter beschikking stellen, aligneren of combineren, afschermen, wissen of vernietigen van gegevens;
    </ol>
  </div>
    <br>
terms:
  natuurlijke persoon: |
    Een **natuurlijke persoon** is een mens van vlees en bloed die zelfstandig drager is van rechten en plichten.
    Ook eenmanszaken vallen hieronder omdat de eigenaar van de eenmanszaak persoonlijk aansprakelijk is voor de verplichtingen van de onderneming.
  de betrokkene: |
    Als we het hebben over een **betrokkene** dan gaat het dus om een geïdentificeerde of identificeerbare natuurlijke persoon.  
