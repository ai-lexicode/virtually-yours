# 19 | verwerkingsdoelen_pvv
  - note: >
      19. **Verwerkingsdoelen:**<br>
      Voor welke doelen verwerk jij persoonsgegevens?
    help: >
      De doelen met betrekking tot wettelijke plicht en facturen zijn alvast aangevinkt, omdat die sowieso van toepassing zijn.
      <br><br>
      Als je ook nog persoonsgegevens verwerkt voor doelen die niet hier (of in de andere vragen in deze sectie) staan vermeld, vink dan (ook) 
      *“Anders / Ik weet het (nog) niet en pas dit later zelf aan”* aan. 
      Er komt dan in je privacyverklaring een blauw stukje tekst te staan waar je dan later zelf (andere) verwerkingsdoelen kunt invullen.
      <br><br>
      *Tip:<br>
      om de privacyverklaring niet onnodig lang te maken kun je het beste alleen datgene selecteren wat daadwerkelijk nu van 
      toepassing is en/of waarvan je weet dat je dat op korte termijn gaat toepassen.*
  - field: verwerkingsdoelen_pvv
    label: >
      19.
    datatype: checkboxes
    minlength: 1
    choices:
      - Om facturen te kunnen versturen en incasseren<br>*(verplicht)*: facturen
      - Om facturen te betalen<br>*(verplicht)*: betalingen
      - Om aan een wettelijke plicht te voldoen<br>*(verplicht)*: plicht
      - Om een overeenkomst aan te gaan en uit te voeren en contact te onderhouden<br>*(verplicht)*: uitvoering
      - Om te reageren op contact- of informatieverzoeken<br>*(verplicht)*: contactverzoek
      - Om offertes op te stellen en te versturen: offertes
      - Om (kennismakings)gesprekken in te plannen en te bevestigen: kennismakingsgesprek
      - Om contacten te informeren over wijzigingen in je dienstverlening: wijzigingen
      - Om nieuwsbrieven te versturen: nieuwsbrieven
      - Om relatiegeschenken, attenties en kaarten te versturen: relatiegeschenken
      - Om reviews op je website of socialemediakanalen te plaatsen: reviews
      - Om evaluatieformulieren toe te sturen: evaluatieformulieren
      - Anders / Ik weet het (nog) niet en pas dit later zelf aan in het document: anders
    none of the above: False
    default:
      - facturen
      - betalingen
      - plicht
      - uitvoering
      - contactverzoek
# 20 | webtraffic_pvv
  - note: >
      20. **Online identificatoren:**<br>
      Verwerk je ook voor deze doelen persoonsgegevens?
    help: >
      Zijn een of meerdere van deze doelen op jou van toepassing? Dan verzamel je mogelijk **IP-adressen**, **locaties** of **browsegegevens**.
      <br><br>
      De cookies die je gebruikt op je website komen verderop in deze vragenlijst nog uitgebreider aan de orde.
      <br><br>
      In de AVG (Overweging 30) staat het volgende: 
      <br><br>
      *“Natuurlijke personen kunnen worden gekoppeld aan online-identificatoren via hun apparatuur, applicaties, instrumenten en protocollen, 
      zoals internetprotocol (IP)-adressen, identificatiecookies of andere identificatoren zoals radiofrequentie-identificatietags.
      <br><br>
      Dit kan sporen achterlaten die, met name wanneer zij met unieke identificatoren en andere door de servers ontvangen informatie worden gecombineerd, 
      kunnen worden gebruikt om profielen op te stellen van natuurlijke personen en natuurlijke personen te herkennen.”*
      <br><br>
      Mocht je online identifcatoren, zoals ip-adressen, locaties of browsegegevens verzamelen voor andere dan de hier genoemde doelen, 
      vink dan (ook) *“Ik verwerk online identificatoren voor andere doelen dan hierboven genoemd”* aan.
      Er komt dan in je privacyverklaring een blauw stukje tekst te staan waar je dan later zelf (andere) verwerkingsdoelen kunt invullen.
  - field: webtraffic_pvv
    label: >
      20.
    datatype: checkboxes
    minlength: 1
    choices:
      - Om via je website iDEAL betalingen te ontvangen: ideal
      - Om gratis digitale weggevers te overhandigen: weggevers
      - Om websitebezoeken te monitoren: websitebezoeken
      - Ik verwerk online identificatoren (ook) voor andere doelen dan hierboven genoemd: anders
      - Nee, ik verwerk geen persoonsgegevens voor deze doelen: nee
    none of the above: False
