# 27 | bewaartermijn
  - note: >
      27. **Bewaartermijn (ter info):**<br>
      Hoe lang wil je persoonsgegevens bewaren (als er geen wettelijke bewaartermijn van toepassing is)?
      <br><br>
      *Je hoeft deze vraag hier nu niet te beantwoorden. Je dient de bewaartermijnen zelf achteraf nog in te vullen in de privacyverklaring.*
    help: >
      Voor ieder gegeven antwoord bij de vraag "Voor welke doelen verwerk jij persoonsgegevens?" dien je een bewaartermijn te hanteren. 
      In de privacyverklaring kun je zelf straks per doel de bewaartermijn aanpassen.
      Standaard staat er bij de meeste doelen “niet langer dan strikt noodzakelijk”, maar dit kun (moet) je dus zelf nader specificeren.
      <br><br>
      Om een goede administratie te kunnen bijhouden, moeten organisaties bepaalde persoonsgegevens een tijd bewaren. Maar dat mag niet langer gebeuren dan noodzakelijk is.
      In de AVG staat geen concrete bewaartermijn voor persoonsgegevens. Organisaties bepalen zelf hoe lang zij persoonsgegevens bewaren. 
      De bewaartermijn kan ook nog verschillen per type gegevens of type verwerking.
      <br><br>
      Voor sommige gegevens geldt een wettelijke termijn in verband met belastingplicht (bijv. gegevens met betrekking tot facturen). 
      De bewaartermijn voor deze gegevens worden automatisch ingevuld in de privacyverklaring. Deze vraag heeft dus betrekking op de bewaartermijn van gegevens die geen wettelijk verplichte bewaartermijn kennen.
# 28 | buiten EER
  - note: >
      28. **Buiten EER:**<br>
      Verwerk je **zelf** gegevens buiten de Europese Economische Ruimte (EER)?
    help: >
      De Europese Economische Ruimte (EER) is een uitgebreid economisch samenwerkingsgebied tussen de Europese Unie (EU)-landen en Noorwegen, IJsland en Liechtenstein. 
      Deze vraag gaat over of **jijzelf** persoonsgegevens verwerkt buiten de EER, bijvoorbeeld als je werkt in het buitenland. 
      Het gaat dus niet over **andere partijen** die in jouw opdracht persoonsgegevens buiten de EER verwerken.
      <br><br>
      Het is namelijk goed mogelijk dat je gebruik maakt van andere partijen, voor bijvoorbeeld hosting of cloudopslag, die de gegevens verwerken in landen van buiten de EER, 
      bijvoorbeeld de Verenigde Staten. Denk hierbij aan partijen als Google. Je moet je ervan verzekeren dat deze buitenlandse partijen bij de verwerking van persoonsgegevens een beschermingsniveau 
      bieden dat gelijk is aan het beschermingsniveau van de AVG. In de privacyverklaring wordt standaard opgenomen dat je je ervan verzekert dat deze derde partijen voldoende zorgvuldig 
      omgaan met de veiligheid van de persoonsgegevens.
      <br><br>
      *Tip:<br>
      op de website van de Autoriteit Persoonsgegevens kun je zien hoe je passende waarborgen kunt treffen en ook in welke situatie en voor welke landen je geen aanvullende maatregelen hoeft te nemen, 
      bijvoorbeeld omdat de Europese Commissie besloten heeft dat de nationale wetgeving van een land een passend niveau van gegevensbescherming biedt.*
    #https://www.autoriteitpersoonsgegevens.nl/themas/internationaal/doorgifte-binnen-en-buiten-de-eer/doorgifte-persoonsgegevens-buiten-de-eer#
  - field: buiteneer_pvv
    label: >
      28.
    input type: radio
    choices:
      - Nee *(meest gekozen)*: nee
      - Ja: ja
