# 37 | verwofverantw_vwo
  - note: >
      37. **Verwerker:**<br>
      Gebruik je de verwerkersovereenkomst als 'Verwerker' of als 'Verwerkingsverantwoordelijke'?
    help: >
      De partij die het doel en de essentiële middelen voor de verwerking bepaalt is de **verwerkingsverantwoordelijke**. 
      Dit is meestal de opdrachtgever.
      <br><br>
      De partij die ten behoeve van de verwerkingsverantwoordelijke persoonsgegevens verwerkt is de **verwerker**. 
      Dit is meestal de VA.
      <br><br>
      In de praktijk neemt de verwerkingsverantwoordelijke vaak het initiatief voor het opstellen van een verwerkersovereenkomst. 
      Het initiatief om een verwerking uit te besteden komt immers ook van deze partij. Maar het mag ook andersom. 
      Let op dat volgens de wet zowel de verwerkingsverantwoordelijke als de verwerker verantwoordelijk zijn voor het 
      gebruiken van een goede verwerkersovereenkomst. Beide partijen zijn dus aansprakelijk als zo een overeenkomst ontbreekt. 
      Het maakt hierbij niet uit wie de overeenkomst aanlevert.
      <br><br>
      De verwerkingsverantwoordelijke blijft wel altijd verantwoordelijk voor de verwerking. 
      Ook als de verwerkersovereenkomst is opgesteld door de verwerker.
      <br><br>
      *Tip:<br>
      Als de overeenkomst is opgesteld voor de situatie waarin jij de verwerker bent, kun je deze eenvoudig zelf aanpassen naar een overeenkomst waarin jij de verwerkingsverantwoordelijke bent.*
  - field: verwofverantw_vwo
    label: >
      37.
    input type: radio
    choices:
      - Als verwerker *(meest gekozen)*: Verwerker
      - Als verwerkingsverantwoordelijke: Verwerkingsverantwoordelijke
      - Ik gebruik geen verwerkersovereenkomst: geen verwerkersovereenkomst
