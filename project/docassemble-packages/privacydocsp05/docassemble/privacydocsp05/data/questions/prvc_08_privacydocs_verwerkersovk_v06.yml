# 38a | akkoord_vwo
  - note: >
      38. a. **Akkoord:**<br>
      Op welke wijze wil je dat partijen akkoord geven op de verwerkersovereenkomst?
    help: >
      Voor de rechtsgeldigheid van de overeenkomst is het voldoende als je opdrachtgever een e-mail stuurt waarin deze expliciet aangeeft akkoord te gaan met de overeenkomst. 
      Zorg wel dat duidelijk is om welke overeenkomst het gaat. Dit kan bijvoorbeeld door de opdrachtgever bij de e-mail met het akkoord de overeenkomst als bijlage te laten toevoegen 
      (“ik ga akkoord met bijgevoegde overeenkomst”). Maar als je een offerte e-mailt naar een opdrachtgever, en deze stuurt als reply een akkoord, is het ook goed. 
      Het gaat er met andere woorden om dat beide partijen expliciet akkoord gaan met de overeenkomst en dat er geen twijfel kan bestaan over welke overeenkomst het dan zou gaan.
      <br><br>
      Je kunt ook gebruik maken van digitale handtekeningen met behulp van een programma zoals DocuSign, of Signrequest.
  - field: akkoord_vwo
    label: >
      38a.
    datatype: checkboxes
    minlength: 1
    choices:
      - Akkoord via e-mail. Er wordt geen handtekening geplaatst. *(meest gekozen)*: e-mail
      - Via een digitale handtekening: digitaal
      - Schriftelijk (op papier) middels een handtekening: schriftelijk
      - Anders / Ik weet het (nog) niet en pas dit later zelf aan in het document: anders
# 38b | handtekening_vwo
  - note: >
      38. b. **Handtekening:**<br>
      Wil je dat de verwerkersovereenkomst onderaan voorzien is van een ruimte 
      waar beide partijen hun handtekening dienen te plaatsen?
    help: >
      Mocht je toch liever de overeenkomst aan gaan met handtekeningen, dan kan dat natuurlijk ook. 
      In dat geval moet er een ruimte opgenomen worden in het document waar de handtekeningen geplaatst kunnen worden. 
      Het document kan dan per post worden verstuurd, of gescand en gemaild worden.   
  - field: handtekening_vwo
    label: >
      38b.
    input type: radio
    choices:
      - Nee, akkoord gaat via e-mail en er worden geen handtekeningen geplaatst *(meest gekozen)*: e-mail
      - Ja: ja
      - Nee: nee
# 38c | paraaf_vwo
  - note: >
      38. c. **Paraaf:**<br>
      Wil je dat verwerkersovereenkomst op elke pagina in de footer voorzien is van een ruimte 
      waar beide partijen hun paraaf dienen te plaatsen?
  - field: paraaf_vwo
    label: >
      38c.
    input type: radio
    choices:
      - Nee, akkoord gaat via e-mail en er worden geen parafen geplaatst. *(meest gekozen)*: e-mail
      - Ja: ja
      - Nee: nee
