# SECTIE Verwerkersovereenkomst
#---------------------------------
id: id_verwerkersovereenkomst
mandatory: True
question: |
  Verwerkersovereenkomst
subquestion: |
  <div style="
    display:block;
    padding:16px;
    border:1px solid #e5e7eb;
    border-radius:12px;
    background:#f6efe7;
    color:#000000;
    box-shadow:0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
  ">
    <strong>De verwerkersovereenkomst</strong>
    <br>
    Wanneer je voor een opdrachtgever {persoonsgegevens} gaat {verwerken}, 
    en jouw opdrachtgever bepaalt het doel en de essentiële middelen voor de verwerking, 
    dan ben jij een ‘{verwerker}’ en is jouw opdrachtgever de ‘{verwerkingsverantwoordelijke}’. 
    Over ‘niet-essentiële middelen’, zoals bijvoorbeeld welk type hard- of software je gebruikt,
    mag je als verwerker wel zelfstandig beslissingen nemen.
    <br><br>
    Als je persoonsgegevens gaat verwerken in opdracht van je opdrachtgever, dan is een verwerkersovereenkomst in de meeste gevallen wettelijk verplicht.
    In de verwerkersovereenkomst leg je dan o.a. vast welke persoonsgegevens je gaat verwerken, en met welke doelen je deze gegevens gaat verwerken. 
    Ook leg je hierin vast hoe de gegevens beveiligd worden en wat je zult doen als er zich een datalek voordoet.
    Daarnaast moet de verwerkersovereenkomst nog andere onderwerpen verplicht behandelen, zoals een geheimhoudingsplicht, subverwerkers, privacyrechten en audits. 
  </div>
    <br>
terms:
  persoonsgegevens: |
    Bij persoonsgegevens gaat het om informatie die ofwel direct over iemand gaat, 
    ofwel indirect naar deze persoon te herleiden is. Bijvoorbeeld door meerdere persoonsgegevens met elkaar te combineren. 
    Van bijvoorbeeld adresgegevens en namen is het voor iedereen wel duidelijk dat het om persoonsgegevens gaat. 
    Maar soms ligt het iets minder voor de hand. 
    Accountnamen op social media kunnen bijvoorbeeld soms ook herleidbaar zijn tot een individu en vallen dan ook onder persoonsgegevens.
  verwerken: |
    Bij het werkwoord *“verwerken”* denk je misschien aan het actief dingen doen met de gegevens, 
    maar het begrip moet dus ruim gezien worden. Volgens de AVG vallen in ieder geval de volgende handelingen onder het verwerken van persoonsgegevens: 
    verzamelen, vastleggen, ordenen, structureren, opslaan, bijwerken of wijzigen, opvragen, raadplegen, gebruiken, doorzenden, verspreiden, 
    beschikbaar stellen, samenbrengen, met elkaar in verband brengen, afschermen, wissen en vernietigen. 
    Dus ook het simpelweg raadplegen van gegevens valt onder het begrip ‘verwerken’.
  verwerker: |
    De **verwerker** is de partij die ten behoeve van de verwerkingsverantwoordelijke persoonsgegevens verwerkt.
    Dit is meestal de VA.
  verwerkingsverantwoordelijke: |
    De **verwerkingsverantwoordelijke** is de partij die het doel en de essentiële middelen voor de verwerking bepaalt.
    Dit is meestal de opdrachtgever.
