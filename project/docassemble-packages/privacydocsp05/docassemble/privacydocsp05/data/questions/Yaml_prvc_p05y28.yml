---
event: kick_out_user
question: |
  Aanmelden of inloggen
subquestion: |
  <span style="color: SandyBrown;">**Nieuwe vragenlijst starten**</span>
  <br>
  Als je voor het eerst een vragenlijst gaat starten, registreer je dan eerst via het menu rechtsboven. Door je te registreren ga je ermee akkoord dat je gegevens worden verwerkt conform de [privacyverklaring](https://www.livelaughlaw.nl/privacyverklaring) van dit platform.
  <br><br>
  <span style="color: SandyBrown;">**Verder gaan met eerder gestarte vragenlijst?**</span>
  <br>
  Als je verder wilt gaan met een vragenlijst die je eerder bent gestart, log dan in via het menu rechtsboven. 
  Selecteer na het inloggen bij "Mijn interviews" de vragenlijst die je eerder bent gestart (let op de startdatum).
---
