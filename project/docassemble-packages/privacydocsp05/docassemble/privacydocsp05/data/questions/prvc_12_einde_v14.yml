#---------------------------------
# SECTIE Klaar
#---------------------------------
id: id_klaar
mandatory: True
question: |
  Antwoorden verzonden
subquestion: |
  % if antwoorden_verstuurd_prvc:
    Bedankt! Je antwoorden zijn verzonden.
    <br>
    <div style="
     display:block;
      padding:8px;
      border-radius:3px;
      background:#0dcaf0;
      color:#ffffff;
      box-shadow:0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
    ">
      <strong>Vervolgstappen</strong>
      </div>
    <ol>
      <li>
        Ik stuur je per e-mail een bevestiging dat ik je antwoorden in goede orde heb ontvangen.
        Als je niet binnen enkele dagen een bevestiging van mij ontvangt, neem dan contact met me op via info@virtually-yours.nl.
      </li><br>
      <li>
        Aan de hand van jouw antwoorden stel ik de eerste versies van de documenten op.
      </li><br>
      <li>
        Ik stuur je zo spoedig mogelijk per e-mail deze eerste versies toe.
        Meestal ontvang je ze binnen twee weken na ontvangst van jouw antwoorden, tenzij we een andere termijn hebben afgesproken
      </li>
    </ol>
    Heb je in de tussentijd nog vragen? Neem dan gerust contact met mij op. Je kunt nu afsluiten of je antwoorden naar jezelf laten e-mailen.
    <br>
    <div style="
      display:block;
      padding:8px;
      border-radius:3px;
      background:#0dcaf0;
      color:#ffffff;
      box-shadow:0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
    ">
      <strong>Antwoorden e-mailen (optioneel)</strong>
    </div>
    Als je de vragen met toelichtingen en inclusief de door jou gegeven antwoorden per e-mail in pdf-formaat wilt ontvangen, klik dan op *Antwoorden e-mailen*.
    <br><br>
  % else:
    Het is helaas niet gelukt om je antwoorden te versturen. Neem contact op met webmaster@lexicode.nl
  % endif
right: |
  <br><br><br><br><br><br>[FILE fotorishavy.png]<br>
  *Risha Smeding<br>
  Jurist en Juridisch VA
  info@virtually-yours.nl*
buttons:
  - Afsluiten: leave
    url: https://virtuallyyours.legalwebshop.nl/faq
  - Antwoorden e-mailen: continue
