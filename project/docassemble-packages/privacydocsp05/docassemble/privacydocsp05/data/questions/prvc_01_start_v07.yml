id: id_tipstechnisch
mandatory: True
continue button field: naar_inhtips
continue button label: |
    Verder
question: |
  Technische tips
subquestion: |
  Enkele technische tips vooraf:<br>

  * <span style="color: #0dcaf0;">**Desktop**</span><br>
  Deze vragenlijst is geoptimaliseerd voor desktops en niet voor mobiele apparaten.
  Hoewel je de vragenlijst ook kunt invullen op je mobiel, heb je de beste gebruikerservaring bij het gebruik op een desktop.<br><br>
  Deze vragenlijst bevindt zich nog in de testfase en is op dit moment het meest uitgebreid getest in de Chrome-browser.

  * <span style="color: #0dcaf0;">**Interactief**</span><br>
  Aan de hand van de door jou gegeven antwoorden past de vragenlijst automatisch aan welke vragen aan jou voorgeschoteld worden. 
  Zo hoef je vragen die niet relevant zijn voor jou dus niet voor niks door te lezen.

  * <span style="color: #0dcaf0;">**Probeer het gebruik van de knop "terug" te voorkomen**</span><br>
  Als je deze knop gebruikt en teruggaat naar een eerdere pagina, dan raak je je ingevulde antwoorden van die pagina kwijt.
  Je kunt het beste via het menu het betreffende onderwerp aanklikken en dan klikken op *Wijzigen*. Zo raak je geen antwoorden kwijt.

  * <span style="color: #0dcaf0;">**Later weer verder gaan**</span><br>
  De vragenlijst is alleen maar te gebruiken als je ingelogd bent. Omdat je ingelogd bent, kunnen je antwoorden worden opgeslagen. 
  Je kunt dan tussentijds stoppen en later weer terugkomen en verder gaan waar je gebleven was.
  Als je meerdere vragenlijsten bent gestart, dan kun je een overzicht van je vragenlijsten vinden in je account bij "Mijn Interviews".
  Daar kun je ze aanklikken om verder te gaan.

  * <span style="color: #0dcaf0;">**Antwoorden e-mailen**</span><br>
  Op het einde van de vragenlijst kun je de door jou gegeven antwoorden in een pdf naar jezelf e-mailen (feature bevindt zich nog in de testfase).
  
  * <span style="color: #0dcaf0;">**Hulp**</span><br>
  Loop je tijdens het doorlopen van de vragenlijst tegen een technisch probleem aan? Kijk dan even bij de Hulp-sectie, bovenaan de pagina.
