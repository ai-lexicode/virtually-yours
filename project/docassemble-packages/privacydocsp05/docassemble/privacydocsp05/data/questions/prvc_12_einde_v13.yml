id: id_inzenden
mandatory: True
question: |
  Antwoorden versturen
subquestion: |
  Dit waren alle vragen. Dank je wel voor al je antwoorden!
  <br><br>
  Klik op "Versturen" om je antwoorden in te zenden.
continue button label: Versturen
continue button field: antwoorden_verstuurd_prvc
#---
progress: 95
section: sec_verstuurd
---
mandatory: True
code: |
  if antwoorden_verstuurd_prvc == True:
    trigger_resubmit = False
