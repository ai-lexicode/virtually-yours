# 00 | email_sent_ok
# _________________________________
mandatory: True
event: bg_taskdocs
code: |
  email_sent_ok = send_email(to=['risha@virtually-yours.nl'],
                       template=resultaten_email,
                       attachments=[
                         cov_v25,
                         dis_v07,
                         opm_v09,
                         pvv_v28,
                         prvc_varp05v09,
                         vwo_v20
                       ]
  )
  log("bg_taskdocs afgerond.")
  background_response()
