#---------------------------------
# SECTIE Klaar
#---------------------------------
id: id_klaar
mandatory: true
question: |
  Antwoorden verzonden
subquestion: |
  % if antwoorden_verstuurd_prvc:
    Bedankt! Je antwoorden zijn verzonden.
    <br>
    <div style="
     display:block;
      padding:8px;
      border-radius:3px;
      background:#0dcaf0;
      color:#ffffff;
      box-shadow:0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
    ">
      <strong>Vervolgstappen</strong>
      </div>
    <ol>
      <li>
        Ik stuur je per e-mail een bevestiging dat ik je antwoorden in goede orde heb ontvangen.
        Als je niet binnen enkele dagen een bevestiging van mij ontvangt, neem dan contact met me op via info@virtually-yours.nl.
      </li><br>
      <li>
        Aan de hand van jouw antwoorden stel ik de eerste versies van de documenten op.
      </li><br>
      <li>
        Ik stuur je zo spoedig mogelijk per e-mail deze eerste versies toe.
        Meestal ontvang je ze binnen twee weken na ontvangst van jouw antwoorden, tenzij we een andere termijn hebben afgesproken
      </li>
    </ol>
    Heb je in de tussentijd nog vragen? Neem dan gerust contact met mij op. Je kunt nu afsluiten of je antwoorden naar jezelf laten e-mailen.
    <br>
    <div style="
      display:block;
      padding:8px;
      border-radius:3px;
      background:#0dcaf0;
      color:#ffffff;
      box-shadow:0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
    ">
      <strong>Antwoorden e-mailen (optioneel)</strong>
    </div>
    Als je je gegeven antwoorden per e-mail in pdf-formaat wilt ontvangen, klik dan op *Antwoorden e-mailen*.
  % else:
    Het is helaas niet gelukt om je antwoorden te versturen. Neem contact op met webmaster@lexicode.nl
  % endif
right: |
  <br><br><br><br><br><br>[FILE fotorishavy.png]<br>
  *Risha Smeding<br>
  Jurist en Juridisch VA
  info@virtually-yours.nl*
buttons:
  - Afsluiten: leave
    url: https://virtuallyyours.legalwebshop.nl/faq
  - Antwoorden e-mailen: continue
#---
progress: 99
section: sec_klaar
---
id: id_pdfmailen
mandatory: true
question: |
  Jouw antwoorden ontvangen
subquestion: |
  Let op, de e-mail kan in je spamfolder terechtkomen. Het kan een paar minuten duren voordat je de e-mail ontvangt.
  <br><br>
  Deze feature bevindt zich in de testfase.
  Als je de e-mail niet ontvangt, of als je een foutje tegenkomt, dan hoor ik het graag.
fields:
  - Op welk e-mailadres wil je de pdf met gegeven antwoorden ontvangen?: recipient.email
    datatype: email
    default: ${ user_info().email }
---
mandatory: True
code: |
  the_pdftask = background_action('bg_taskpdf')
  log("bg_taskpdf gestart.")
---
id: id_afsluiten
mandatory: true
question: |
  Bedankt! Je kunt nu afsluiten
buttons:
  - Afsluiten: leave
    url: https://virtuallyyours.legalwebshop.nl/faq
---
id: id_pdf
attachments:
  - name: Gegeven antwoorden_${ bedrijfsnaam_client }_output
    docx template file: Docassemble_prvc_var_p05v09.docx
    variable name: prvc_varp05v09pdf
    valid formats:
      - pdf
---
mandatory: True
event: bg_taskpdf
code: |
  pdf_sent_ok = send_email(to=recipient, bcc=lexicode, template=pdf_email, attachments=prvc_varp05v09pdf)
  log("bg_taskpdf afgerond.")
  background_response()
---
code: |
  lexicode.email = "info@lexicode.nl"
---
# _________________________________
#  | pdf_email
# _________________________________
template: pdf_email
subject: |
  Jouw antwoorden uit de vragenlijst
content: |
  Hi ${ voornaam_client },

  In de bijlage tref je een pdf van de door jou gegeven antwoorden.

  Deze feature bevindt zich nog in de testfase. Mocht je onverhoopt een foutje aantreffen in de pdf, dan hoor ik het graag!

  Hartelijke groet,

  Risha
---
