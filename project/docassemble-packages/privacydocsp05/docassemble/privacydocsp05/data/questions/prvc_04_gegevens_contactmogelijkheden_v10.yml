# 14 | contactmogelijkheden
  - note: >
      14. **Contactmogelijkheden:**<br>
      Op welke manieren kan er contact met je opgenomen worden?
    help: >
      **WhatsApp:**
      <br>
      Als je WhatsApp gebruikt als communicatiemiddel, dan 'verwerk' je, naast het telefoonnummer, vaak ook de naam en profielfoto van deze persoon. 
      Daarnaast kun je vaak gegevens zoals online status, tijdstip van verzenden of verzendstatus bekijken.
      <br><br>
      **Contactformulier:**      
      <br>
      Heeft jouw website een formulier dat ingevuld kan worden, bijvoorbeeld een contactformulier? 
      Dan verzamel je mogelijk het *IP-adres* en de *locatie* van degene die het formulier invult en verstuurt.
      <br><br>
      *Tip: vraag via het contactformulier alleen informatie die je écht nodig hebt. 
      Het is niet toegestaan om overbodige of niet relevante informatie te vragen. 
      Ga dus bij elk veld na óf je die informatie daadwerkelijk nodig hebt en verwijder desgewenst niet relevante velden.*
      <br><br>
      **Socialemediakanalen**
      <br>
      *Socialemedia-accountnamen* kunnen ook onder ‘persoonsgegevens’ vallen als deze accountnamen herleidbaar zijn tot een persoon. 
      Dit is sowieso het geval als de accountnaam iemands echte naam bevat. Maar zelfs als de accountnaam op het eerste gezicht anoniem lijkt, 
      kan deze toch herleidbaar zijn tot een persoon. 
      Bijvoorbeeld doordat het profiel is gekoppeld aan foto’s, locatie of een bio.
  - field: contact_client
    label: >
      14.
    datatype: checkboxes
    minlength: 2
    choices:
      - Bezoek- of postadres (verplicht): adres
      - E-mail (verplicht): e-mail
      - Telefonisch bellen: telefoon
      - WhatsApp: whatsapp
      - Contactformulier website: contactformulier
      - Socialemediakanalen: socials
      - Anders / Ik weet het (nog) niet.<br>*(pas later zelf aan in het document)*: anders
    default:
      - adres
      - e-mail
    none of the above: False 
# 15 | email_client
  - note: >
      15. **E-mail:**<br>
      Wat is het e-mailadres dat in je privacyverklaring en eventuele cookieverklaring opgenomen mag worden?
  - field: email_client
    label: >
      15.
# 16 | adres_pvv
  - note: >
      16. **Adres:**<br>
      Wil je naast je e-mailadres ook je vestigingsadres of contactadres opnemen in je privacyverklaring en eventuele cookieverklaring?
    help: >
      Het is niet verplicht om je volledige vestigingsadres op te nemen in je privacy- en cookieverklaring. 
      Je vestigingsplaats wordt wel standaard opgenomen.
  - field: adres_pvv
    label: >
      16.
    input type: radio
    choices:
      - Nee *(meest gekozen)*: nee
      - Ja: ja
# 17a | telefoon_pvv
  - note: >
      17. **Telefoon:**<br>
      Wil je naast je e-mailadres ook je telefoonnummer opnemen in je privacyverklaring en eventuele cookieverklaring? 
    help: >
      Het is niet verplicht om je telefoonnummer op te nemen in je privacy- en cookieverklaring. 
      Het is wél verplicht om duidelijke contactinformatie te verstrekken, maar dat mag dus ook een e-mailadres zijn.
    js show if: |
      (val("contact_client") || []).includes("telefoon") || (val("contact_client") || []).includes("whatsapp")
  - field: telefoon_pvv
    label: >
      17a. 
    input type: radio
    choices:
      - Nee *(meest gekozen)*: nee
      - Ja: ja
    js show if: |
      (val("contact_client") || []).includes("telefoon") || (val("contact_client") || []).includes("whatsapp") 
# 17b | telefoonnummer_client
  - field: telefoonnummer_client
    label: >
      17b.<br>
      Wat is je telefoonnummer?
    help: >
      Het telefoonnummer dat je hier invult wordt opgenomen in je privacyverklaring en eventuele cookieverklaring.
      Dit mag zowel een mobiel nummer als een vast nummer zijn.
    default: +31(0)
    js show if: |
      val('telefoon_pvv') == "ja" && ((val("contact_client") || []).includes("telefoon") || (val("contact_client") || []).includes("whatsapp"))
