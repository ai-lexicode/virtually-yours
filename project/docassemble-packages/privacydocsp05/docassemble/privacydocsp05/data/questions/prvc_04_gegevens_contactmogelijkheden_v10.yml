# 13a | website_client
  - note: >
      13. **Website:**<br>
      Heb je een website waar je een privacyverklaring en eventueel een cookieverklaring voor nodig hebt?
    help: >
      Een privacyverklaring is wettelijk verplicht als je persoonsgegevens verwerkt voor je onderneming, ook als je geen website hebt. 
      Als je wel een website hebt, wordt in je privacyverklaring opgenomen hoe je gegevens verwerkt via je website.
      <br><br>
      Een cookieverklaring is wettelijk verplicht als je een website hebt en cookies gebruikt.
  - field: website_client
    label: >
      13a.
    input type: radio
    choices:
      - Ja *(meest gekozen)*: ja
      - Nog niet, maar ik wil wel alvast mijn privacy- en cookieverklaring opstellen voor mijn toekomstige website en ik heb WEL al een URL: alvast
      - Nog niet, maar ik wil wel alvast mijn privacy- en cookieverklaring opstellen voor mijn toekomstige website. Ik heb nog GEEN URL: nog geen URL
      - Nee: nee
# 13b | url_client
  - field: url_client
    label: >
      13b.<br>
      Wat is de URL van je website?
    js show if: |
      val('website_client') == "ja" || val('website_client') == "alvast"
# Opmerking
  - note: >
      <div style="
        display:block;
        padding:16px;
        border:1px solid #e5e7eb;
        border-radius:12px;
        background:#f6efe7;
        color:#000000;
        box-shadow:0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
      ">
        <strong>Opmerking</strong>
        <br>
        Als je een zakelijke website hebt waar je je diensten op aanbiedt ben je wettelijk verplicht om bepaalde informatie op een logische plaats op je website te vermelden.
        <br><br>
        De volgende informatie is in ieder geval verplicht:
          <ul>
          <li>bedrijfsnaam (zoals ingeschreven bij de KvK)</li>
          <li>adresgegevens (een geografisch bezoekadres, dus geen postbus)</li>
          <li>KvK-nummer</li>
          <li>btw-nummer</li>
          <li>e-mailadres</li>
          <li>naast je e-mailadres moet je nog minstens één andere snelle en directe contactmogelijkheid vermelden (zoals een telefoonnummer of contactformulier)</li>
          <li>privacyverklaring en eventuele cookieverklaring</li>
          </ul>
      </div>
    js show if: |
      val('website_client') == "ja" || val('website_client') == "alvast" || val('website_client') == "nog geen URL"
