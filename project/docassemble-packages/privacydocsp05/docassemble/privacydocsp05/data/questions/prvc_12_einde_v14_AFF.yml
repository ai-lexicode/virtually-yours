id: id_klaar
mandatory: True
question: |
  Antwoorden verzonden
subquestion: |
  % if antwoorden_verstuurd_prvc:
    Bedankt! Je antwoorden zijn verzonden.
    <br>
    <div style="
      display:block;
      padding:8px;
      border-radius:3px;
      background:#0dcaf0;
      color:#ffffff;
      box-shadow:0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
    ">
      <strong>Vervolgstappen</strong>
    </div>
    We gaan nu voor je aan de slag om je documenten op maat te maken. Meestal ontvang je deze binnen twee weken, tenzij er een andere termijn is afgesproken.
    <br><br>
    Mocht je nog vragen hebben, neem dan contact op met jouw coach, opleider of contactpersoon.
    <br><br>
    Je kunt nu afsluiten of je antwoorden naar jezelf laten e-mailen.
    <br>
    <div style="
      display:block;
      padding:8px;
      border-radius:3px;
      background:#0dcaf0;
      color:#ffffff;
      box-shadow:0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
    ">
      <strong>Antwoorden e-mailen (optioneel)</strong>
    </div>
    Als je de vragen inclusief je gegeven antwoorden per e-mail in pdf-formaat wilt ontvangen, klik dan op *Antwoorden e-mailen*.
    <br><br>
  % else:
    Het is helaas niet gelukt om je antwoorden te versturen. Neem contact op met webmaster@lexicode.nl
  % endif
right: |
  <br><br><br><br><br><br>[FILE fotorishavy.png]<br>
  *Risha Smeding<br>
  Jurist en Juridisch VA*
buttons:
