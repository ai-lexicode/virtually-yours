# 00 | resultaten_email
# _________________________________
template: resultaten_email
subject: |
  Inzending privacydocs_AFF | ${ bedrijfsnaam_client }
content: |

  &nbsp;|&nbsp; 
  ------|----
  Bedrijfsnaam:| *${ bedrijfsnaam_client }*
  Voornaam:| *${ voornaam_client }*
  Affiliate:| *${ opmerkingenintern_prvc }*
  % if urgentdocprvc_ovk:
   <span style="color:#EE0000;">Urgentie:</span>| <span style="color:#EE0000;">*${ urgentdocprvc_ovk }*</span>
  % endif

  <br>

  ----------

  OPMERKINGEN CLIENT

  &nbsp;|&nbsp;
  ------|----
  Bedrijfsgegevens:| *${ vragen_prvcbedrijfsgegevens }*
  Persoonsgegevens:| *${ vragen_prvcpersoonsgegevens }*
  Contactmogelijkheden:| *${ vragen_prvccontact }*
  Gegevensverwerking:| *${ vragen_prvcverwerking }*
  Databeveiliging:| *${ vragen_prvcdatabeveiliging }*
  Cookies:| *${ vragen_prvccookies }*
  Verwerkers:| *${ vragen_prvcverwerkers }*
  Vragen en opmerkingen:| *${ vragen_prvcalgemeen }*
  Urgentie:| *${ urgentdocprvc_ovk }*

  <br>

  ----------
  
  TECHNISCHE GEGEVENS

  &nbsp;|&nbsp; 
  ------|----
  Versie yaml:| *${ version_prvc }*
  Aanleverdatum:| *${aanleverdatum_prvc }*
  Inzendingsdatum:| *${ current_datetime() }*
  Ingezonden door user:| *${ user_info().email }*

---
# _________________________________
# 00 | oplevering_email
# _________________________________
template: oplevering_email
subject: |
  ${ format_date( aanleverdatum_prvc + date_interval(weeks=2), format='dd-MM-yy' ) } | Oplevering privacydocumenten | ${ bedrijfsnaam_client }
content: |
  <html>
    <body style="font-family: Aptos; font-size: 11pt;"">
      <p>Hi ${ voornaam_client },</p>

      <p>Hierbij ontvang je jouw privacydocumenten.</p>
      
      <p><strong>Bijlagen</strong>
      <br>In de bijlage tref je de volgende documenten:</p>
      % if vragen_prvcbedrijfsgegevens or vragen_prvcpersoonsgegevens or vragen_prvccontact or vragen_prvcverwerking or vragen_prvcdatabeveiliging or vragen_prvccookies or vragen_prvcverwerkers or vragen_prvcalgemeen:
      <p><ul>
        <li>1a_Privacyverklaring (.docx)</li>
        <li>1b_Privacyverklaring opgemaakte versie (.pdf)</li>
        <li>2a_Cookieverklaring (.docx)</li>
        <li>2b_Cookieverklaring opgemaakte versie (.pdf)</li>
        <li>3a_Disclaimer (.docx)</li>
        <li>3b_Disclaimer opgemaakte versie (.pdf)</li>
        <li>4_Verwerkersovereenkomst (.docx)</li>
        <li>5_Vragen en opmerkingen (.docx)</li>
        <li>A_Uitleg over de privacydocumenten (.pdf)</li>
      </ul></p>
      % else:
        <li>1a_Privacyverklaring (.docx)</li>
        <li>1b_Privacyverklaring opgemaakte versie (.pdf)</li>
        <li>2a_Cookieverklaring (.docx)</li>
        <li>2b_Cookieverklaring opgemaakte versie (.pdf)</li>
        <li>3a_Disclaimer (.docx)</li>
        <li>3b_Disclaimer opgemaakte versie (.pdf)</li>
        <li>4_Verwerkersovereenkomst (.docx)</li>
        <li>A_Uitleg over de privacydocumenten (.pdf)</li>
        </ul></p>
      % endif

      <p><strong>Blauwe tekst</strong>
      <br>De documenten bevatten op enkele plekken <span style="color:#00B0F0;">blauwgedrukte tekst</span>. Dat kan het volgende betekenen:</p>

      <p><ol type="a">
        <li>De meeste van de blauwe stukken tekst in de verwerkersovereenkomst zijn gemarkeerd omdat het voor iedere opdracht(gever) weer anders kan zijn, dus die vul je in zodra er meer bekend is over de opdracht(gever).</li>
        <li>Als je bij een vraag in de vragenlijst <em>“Anders / Ik weet het (nog) niet en ik pas het later zelf aan in het document”</em> had geselecteerd, dan wordt het bijbehorende stuk tekst blauw gemarkeerd in de betreffende documenten, zodat je dat stuk zelf achteraf makkelijk kunt aanpassen. Deze stukken tekst zijn, waar mogelijk, voorzien van het nummer van de bijbehorende vraag. Zo kun je de toelichting en de mogelijke antwoorden makkelijk terugvinden.</li>
        <li>Het kan ook nog zijn dat er stukken tekst blauw gemarkeerd zijn omdat deze artikelen om wat voor reden dan ook ter sprake zijn gekomen, ofwel in een van je opmerkingen, ofwel in de toelichting.</li>
      </ol></p>

      <p><strong>Opgemaakte versies</strong>      
      <br>Voor documenten zijn ook opgemaakte versies bijgevoegd. Deze kunnen afwijken van de originele, niet-opgemaakte, versies. Bijvoorbeeld omdat eventuele blauwgedrukte tekst is verwijderd om zodoende alvast een bruikbare, opgemaakte versie te hebben. Hoewel je de opgemaakte versies mag gebruiken, zijn deze hoofdzakelijk bedoeld als inspiratie voor de lay-out van je juridische documenten. Het is de bedoeling dat je de documenten zelf verder naar eigen smaak opmaakt 😊</p>

      % if vragen_prvcbedrijfsgegevens or vragen_prvcpersoonsgegevens or vragen_prvccontact or vragen_prvcverwerking or vragen_prvcdatabeveiliging or vragen_prvccookies or vragen_prvcverwerkers or vragen_prvcalgemeen:
      <p><strong>Vragen, opmerkingen en toelichtingen</strong>
      <br>Eventuele vragen en opmerkingen die je in de vragenlijst hebt geplaatst, kun je met antwoorden terugvinden in het document met bestandsnaam <em>“5_Vragen_en_opmerkingen”</em>.<br></p>
      % endif
      <p><strong>Uitleg over documenten</strong>
      <br>In de bijlage tref je ook een document waarin uitleg over de privacydocumenten staat. Er staat veel informatie in het document. Daarom staat op de eerste pagina een overzicht met de hoofdpunten. Lees in ieder geval deze hoofdpunten door.</p>

      <p>Hopelijk komen de documenten goed van pas en kun je ze snel gaan gebruiken. Veel succes!</p>
  </html>
---