  - field: orgmaatregelen_pvv
    label: >
      31.
    datatype: checkboxes
    minlength: 1
    choices:
      - Maatregelen worden van tijd tot tijd getest, beoordeeld en geëvalueerd: maatregelen testen
      - Als beleid nooit inloggen op een onbeveiligd netwerk: onbeveiligd netwerk
      - Verouderde gegevens automatisch verwijderen: verouderde gegevens
      - Regelmatig beoordelen of u dezelfde doelen kunt behalen met minder persoonsgegevens: minder gegevens
      - Als zich er toch een incident voordoet, kan het tijdig hersteld worden: tijdig herstel
      - Anders / Ik weet het (nog) niet en pas dit later zelf aan in het document: anders
    none of the above: False
