# 30 | techmaatregelen_pvv
  - note: >
      30. **Technische maatregelen:**<br>
      Welke technische maatregelen neem je om verlies, onbevoegde toegang, etc. van gegevens 
      die je verwerkt tegen te gaan? *(selecteer ten minste één optie)*
    help: >
      Dit lijstje bevat enkele suggesties van **technische** maatregelen die je misschien genomen hebt, 
      en dient ook voor een stukje bewustwording over maatregelen die je zou kúnnen nemen. 
      De maatregelen die je treft moeten afgestemd worden op de risico’s en de aard van de te beschermen persoonsgegevens. 
      Dus als er een hoog risico is zul je strengere maatregelen moeten treffen dan wanneer je gegevens verwerkt die 
      niet zo privacygevoelig zijn en/of weinig schade opleveren als er iets misgaat met de gegevens.
      <br><br>
      Als je ook nog technische beveiligingsmaatregelen in je privacyverklaring wilt opnemen die niet hier staan vermeld, 
      vink dan (ook) “Anders / Ik weet het (nog) niet en pas dit later zelf aan” aan. 
      Er komt dan in je privacyverklaring een blauw stukje tekst te staan waar je later zelf (andere) 
      technische beveiligingsmaatregelen kunt invullen.
      <br><br>
      Het is overigens niet noodzakelijk om álle maatregelen te vermelden die je kunt bedenken. 
      Ook hoef je niet al te veel in detail te treden. 
      Het kan juist een veiligheidsrisico zijn als je te gedetailleerd de door jou getroffen maatregelen uiteenzet 
      in je openbaar toegankelijke privacyverklaring. Een korte opsomming van een aantal maatregelen is voldoende.
      <br><br>
      *Tip:
      <br>
      Vraag degene die je website heeft gemaakt (indien van toepassing) welke websitebeveiliging in jouw geval van toepassing is.*
  - field: techmaatregelen_pvv
    label: >
      30.
    datatype: checkboxes
    minlength: 1
    choices:
      - SSL-certificaat voor je website: ssl
      - Computer, programma’s en accounts beveiligen met veilige wachtwoorden: wachtwoorden
      - Beveiliging met tweestapsverificatie waar mogelijk: 2staps
      - Het gebruiken van een beveiligde cloudopslag: cloudopslag
      - Het gebruik van een beveiligd CRM-systeem (bijv. beveiligd door SSL-encryptie): crm
      - Het gebruiken van anti-virus software en firewall: anti-virus
      - Software up-to-date houden, zoals browsers, virusscanners en besturingssystemen: up-to-date
      - Het regelmatig maken van back-ups: back-ups
      - Pseudonimiseren en versleutelen (encryptie): encryptie
      - Anders / Ik weet het (nog) niet en pas dit later zelf aan in het document: anders
    none of the above: False
