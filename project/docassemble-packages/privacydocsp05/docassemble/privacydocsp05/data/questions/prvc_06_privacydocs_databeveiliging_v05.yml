id: id_databeveiliging
mandatory: True
question: |
  Databeveiliging
subquestion: |
  <div style="
    display:block;
    padding:16px;
    border:1px solid #e5e7eb;
    border-radius:12px;
    background:#f6efe7;
    color:#000000;
    box-shadow:0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
  ">
    <strong>Beveiliging van de verwerking</strong>
    <br>
    De AVG stelt het verplicht om passende technische en organisatorische beveiligingsmaatregelen te treffen. In artikel 32 van de AVG lezen we het volgende:
    <br><br>
    <ol><em>
      <li>
        Rekening houdend met de stand van de techniek, de uitvoeringskosten, alsook met de aard, de omvang, de context 
        en de verwerkingsdoeleinden en de qua waarschijnlijkheid en ernst uiteenlopende risico's voor de rechten en vrijheden van personen, 
        treffen de verwerkingsverantwoordelijke en de verwerker passende technische en organisatorische maatregelen 
        om een op het risico afgestemd beveiligingsniveau te waarborgen, die, waar passend, onder meer het volgende omvatten:
        <br><br>
          <ol type="a">
          <li>de pseudonimisering en versleuteling van persoonsgegevens;</li>
          <li>het vermogen om op permanente basis de vertrouwelijkheid, integriteit, beschikbaarheid en veerkracht van de verwerkingssystemen en diensten te garanderen;</li>
          <li>het vermogen om bij een fysiek of technisch incident de beschikbaarheid van en de toegang tot de persoonsgegevens tijdig te herstellen;</li>
          <li>een procedure voor het op gezette tijdstippen testen, beoordelen en evalueren van de doeltreffendheid van de technische en organisatorische maatregelen ter beveiliging van de verwerking.</li>
          </ol>
      </li>
      <br>
      <li>
        Bij de beoordeling van het passende beveiligingsniveau wordt met name rekening gehouden met de verwerkingsrisico’s, vooral als gevolg van de vernietiging, het verlies, 
        de wijziging of de ongeoorloofde verstrekking van of ongeoorloofde toegang tot doorgezonden, opgeslagen of anderszins verwerkte gegevens, hetzij per ongeluk hetzij onrechtmatig.
      </li>
    </em></ol>
  </div>
    <br>
