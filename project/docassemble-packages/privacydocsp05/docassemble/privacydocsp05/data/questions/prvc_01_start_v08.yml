question: |
  Jouw privacy
subquestion: |
  Om juridische documenten voor je op maat te maken, zullen we persoonsgegevens van jou gaan verwerken.
  We gaan altijd zorgvuldig om met jouw persoonsgegevens en houden ons bij de verwerking ervan aan de geldende wet- en regelgeving.

  Door deze website te gebruiken en de vragenlijst(en) in te vullen, ga je ermee akkoord dat we jouw persoonsgegevens verzamelen en verwerken. 
  
  In de [privacyverklaring](https://www.livelaughlaw.nl/privacyverklaring) van ons platform leggen we uit welke gegevens we verzamelen en wat we met deze informatie doen.
