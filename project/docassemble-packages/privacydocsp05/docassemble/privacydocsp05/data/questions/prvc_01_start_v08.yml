id: id_tipsinhoud
mandatory: True
continue button field: aan_de_slag
question: |
  Inhoudelijke tips
subquestion: |
  Enkele inhoudelijke tips vooraf:<br>

  * <span style="color: #0dcaf0;">**Toelichting**</span><br>
  Veel vragen zijn voorzien van nadere uitleg en toelichting. Druk op het symbool met vraagteken achter de vraag om de toelichting te lezen.

  * <span style="color: #0dcaf0;">**Anders / Ik weet het niet**</span><br>
  Bij sommige vragen is er een optie *“Anders / Ik weet het (nog) niet en pas dit later zelf aan in het document”* opgenomen. Je kunt jouw antwoord dan zelf achteraf in het document verwerken. 
  De plek waar je dan iets in moet vullen is in het document gemarkeerd, in de meeste gevallen met vierkante haakjes en hoofdletters in de kleur blauw (bijvoorbeeld <span style="color: #0dcaf0;">[BEDRIJFSNAAM OPDRACHTGEVER]</span>).

  * <span style="color: #0dcaf0;">**Achteraf wijzigen**</span><br>
  Mocht je bij sommige vragen twijfelen over het antwoord, hou dan in je achterhoofd dat je je juridische document (ook) als Word-bestand (.docx) ontvangt. 
  Het is dus mogelijk om achteraf (zelf) wijzigingen door te voeren. Geef je document in dat geval wel een versienummer mee. 
  Zo weet je altijd wat de meest recente versie is en welke versie je hebt gebruikt bij een opdrachtgever.
