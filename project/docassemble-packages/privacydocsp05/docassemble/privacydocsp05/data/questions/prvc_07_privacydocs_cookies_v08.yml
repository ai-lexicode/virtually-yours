# _________________________________
# Cookies
# _________________________________
  - note: >
      <div style="
        display:block;
        padding:16px;
        border:1px solid #e5e7eb;
        border-radius:12px;
        background:#f6efe7;
        color:#000000;
        box-shadow:0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
      ">
        <strong>Wat zijn cookies?</strong>
        <br>
        Cookies zijn kleine tekstbestanden die door de server van een website die je bezoekt op de harde schijf van je computer worden opgeslagen.
        Als je de website dan een volgende keer bezoekt, ontvangt de server deze informatie weer, zodat je computer wordt herkend.
        Dit is bijvoorbeeld noodzakelijk voor een optimale gebruikerservaring van de website, maar cookies kunnen ook gebruikt worden voor andere doeleinden.
        <br><br>
        Cookies zijn in principe ongevaarlijk en kunnen eenvoudig verwijderd worden door gebruikers.
        Voor sommige soorten cookies bestaat er een wettelijke plicht om toestemming van gebruikers te vragen voordat deze geplaatst mogen worden.
      </div>
