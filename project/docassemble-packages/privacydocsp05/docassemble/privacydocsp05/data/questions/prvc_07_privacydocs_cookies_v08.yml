      is: ja
# 34a | cookiessub_pvv
  - field: cookiessub_pvv
    label: >
      34a.
    datatype: checkboxes
    minlength: 1
    choices:
      - Social media buttons: social
      - Optimalisatiecookies: optimalisatie
      - Google (analytics of ads) cookies: google
      - Ik gebruik geen cookies uit deze subcategorieën: nee
    none of the above: False
    show if:
      variable: cookiesgebruik_pvv
      is: ja
    help: >
      **Social media cookies:**<br>
      Buttons (knoppen) om artikelen of pagina’s makkelijk te kunnen delen op socialemediakanalen, 
      die werken met stukjes code die van de netwerken zelf afkomstig zijn. 
      Het gaat hier NIET om icoontjes die je op website plaatst en die je zelf voorziet van een directe link naar je 
      socialemedia-accounts. In de meeste gevallen vallen deze social media buttons onder trackingcookies, 
      omdat ze gebruikers cross-site kunnen volgen en data delen met derden. 
      Het is altijd nodig om hier toestemming voor te vragen.
      <br><br>
      **Optimalisatie cookies:**<br>
      Cookies om de website te optimaliseren. Bijvoorbeeld door verschillende versies van een webpagina te testen om te 
      kijken welke pagina het beste wordt bezocht. In de meeste gevallen vallen optimalisatiecookies onder analytische cookies. 
      Het is noodzakelijk om toestemming te vragen als de gegevens niet zijn geanonimiseerd.
      <br><br>
      **Google cookies:**<br>
      Voor data analyses met Google Analytics en/of advertenties via Google Ads.
