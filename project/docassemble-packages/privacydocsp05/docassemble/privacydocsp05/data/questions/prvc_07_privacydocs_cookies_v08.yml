# 33a | cookiesgebruik_pvv
  - note: >
      33. **Cookies:**<br>
      Gebruik je cookies op je website?
  - field: cookiesgebruik_pvv
    label: >
      33a.
    input type: radio
    choices:
      - Ja: ja
      - Nee, ik heb geen website: geen website
      - Nee, ik heb wel een website maar deze gebruikt geen cookies: nee
# _________________________________
# Cookiesoorten
# _________________________________
  - note: >
      <div style="
        display:block;
        padding:16px;
        border:1px solid #e5e7eb;
        border-radius:12px;
        background:#f6efe7;
        color:#000000;
        box-shadow:0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
      ">
        <strong>Wat voor soorten cookies zijn er?</strong>
        <br>
        Er zijn drie hoofdcategorieën cookies: functionele cookies, analytische cookies en trackingcookies.
        Daarnaast behandelen we in deze vragenlijst ook nog drie subcategorieën: 
        social media buttons, optimalisatiecookies en google cookies. 
        Deze subcategorieën vallen in de meeste gevallen onder analytische cookies of trackingcookies.
      </div>
    js show if: |
      val("cookiesgebruik_pvv") == "ja"
# 33b | cookies_pvv
  - field: cookies_pvv
    label: >
      33b.<br>
      Welke cookies gebruik je?
    datatype: checkboxes
    minlength: 1
    choices:
      - Functionele cookies *(meest gekozen)*: functioneel
      - Analytische cookies *(vaak gekozen)*: analytisch
      - Tracking cookies: tracking
    none of the above: False
    js show if: |
      val("cookiesgebruik_pvv") == "ja"
    help: >
      **Functionele cookies:** cookies die noodzakelijk zijn voor de 
      technische werking van je website en voor het gebruiksgemak van de bezoeker.
      Als je een website hebt, gebruik je vrijwel altijd functionele cookies.
      <br><br>
      **Analytische cookies:** cookies om je website te optimaliseren, 
      bijvoorbeeld door het gedrag van je websitebezoekers te monitoren 
      (hoe vaak wordt een bepaalde pagina bezocht? Etc.).
      <br><br>
      **Tracking cookies:** cookies die het surfgedrag volgen en ook bij andere websites kunnen worden uitgelezen, 
      bedoeld voor bijvoorbeeld het tonen van relevante advertenties of op maat gemaakte content.
      <br><br>
      *Tip: als je niet zeker weet of je website tracking cookies gebruikt, 
      dan kun je een compliance scan doen van bijvoorbeeld Cookiebot. Je krijgt dan een overzicht van trackers 
      op je website en er wordt gecontroleerd of je op de juiste manier toestemming vraagt en naar welke landen 
      je eventueel gegevens doorstuurt.*
# https://usercentrics.sjv.io/o4qDDn
# 33c | funcookiedoel_cov
  - field: funcookiedoel_cov
    label: >
      33c.<br>
      Ik gebruik *functionele* cookies om...
    datatype: checkboxes
    minlength: 1
    choices:
      - mijn website goed en veilig te laten werken: veilig
      - je een optimale gebruikerservaring te bieden: optimaal
      - Anders / Ik weet het (nog) niet en pas dit later zelf aan in het document: anders
    none of the above: False
    help: >
      **Functionele cookies:**<br>
      Cookies die noodzakelijk zijn voor de technische werking van je website en voor het gebruiksgemak van de bezoeker.
      Het is niet nodig om hier toestemming voor te vragen. 
      <br><br>
      *Tip:<br>
      Als je een website hebt, gebruik je vrijwel altijd functionele cookies.*
    js show if: |
      (val("cookiesgebruik_pvv") == "ja") && (val("cookies_pvv") || []).includes("functioneel")
# 33d | anacookiedoel_cov
  - field: anacookiedoel_cov
    label: >
      33d.<br>
      Ik gebruik *analytische* cookies om...
    datatype: checkboxes
    minlength: 1
    choices:
