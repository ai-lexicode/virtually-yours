# _________________________________
# 35 | cookiebanner_pvv
# _________________________________
  - note: >
      <div style="
        display:block;
        padding:8px;
        border-radius:3px;
        background:#0dcaf0;
        color:#ffffff;
        box-shadow:0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
      ">
        <strong>Cookiebanner</strong>
      </div>
    js show if: |
      val("cookiesgebruik_pvv") == "ja"
  - note: >
      35. **Cookiebanner (ter info):**<br>
      Als je cookies gebruikt op je website dien je een cookiebanner te gebruiken.
      Met deze cookiebanner informeer je je websitebezoekers over de cookies die je gebruikt.
      Daarnaast vraag je via de cookiebanner toestemming voor het gebruik van cookies waar toestemming voor is vereist (indien van toepassing).
      <br><br>
      <div style="
        display:block;
        padding:16px;
        border:1px solid #e5e7eb;
        border-radius:12px;
        background:#f6efe7;
        color:#000000;
        box-shadow:0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
      ">
        <strong>Vuistregels cookiebanner</strong>
        <br>
        De Autoriteit Persoonsgegevens heeft een aantal vuistregels opgesteld voor cookiebanners.
        Controleer of jouw cookiebanner hieraan voldoet:
        <br><br>
          <ul>
          <li>Geef informatie over het doel</li>
          <li>Zet vinkjes niet automatisch aan</li>
          <li>Gebruik duidelijke tekst</li>
          <li>Zet verschillende keuzes op één laag</li>
          <li>Verberg bepaalde keuzes niet</li>
          <li>Laat iemand niet extra klikken</li>
          <li>Gebruik geen onopvallende link in de tekst</li>
          <li>Wees helder over het intrekken van toestemming</li>
          <li>Verwar toestemming niet met gerechtvaardigd belang</li>
          </ul>
      </div>
    help: >
      Mocht je het bouwen en onderhouden van website hebben uitbesteed aan een webdesigner of technisch VA, 
      bespreek dan met hem/haar je cookiebanner en van welke cookies je website gebruik maakt. 
      Ook kan hij/zij je misschien helpen met een automatische tool die de cookies die je website gebruikt in kaart brengt.
      <br><br>
      *Tip:<br>
      Kijk voor meer uitleg en voorbeelden over de vuistregels op de website van de Autoriteit Persoonsgegevens (AP).*
      <br><br> 
      *Tip:<br>
      De AP gaat vanaf 2024 vaker controleren of websites op de juiste manier toestemming vragen voor (tracking) cookies of andere volgsoftware. 
      Vragen organisaties niet op de juiste manier toestemming voor het plaatsen van cookies en andere volgsoftware? Dan kan de AP onderzoek doen en handhaven, 
      bijvoorbeeld door een boete op te leggen.*
    js show if: |
      val("cookiesgebruik_pvv") == "ja"
