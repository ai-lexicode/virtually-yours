      - gebruiksgedrag te analyseren: gebruiksgedrag
      - problemen bij het gebruik van mijn website op te sporen: problemen
      - Anders / Ik weet het (nog) niet en pas dit later zelf aan in het document: anders
    none of the above: False
    help: >
      **Analytische cookies:**<br>
      Cookies om je website te verbeteren, bijvoorbeeld door het gedrag van je websitebezoekers te monitoren 
      (hoe vaak wordt een bepaalde pagina bezocht? Waar wordt op geklikt?). In sommige gevallen is het nodig om hier toestemming 
      voor te vragen (als er privacygevoelige informatie wordt verzameld en/of als de gegevens niet zijn geanonimiseerd).
    js show if: |
      (val("cookiesgebruik_pvv") == "ja") && (val("cookies_pvv") || []).includes("analytisch") 
