      Je kunt ervoor kiezen om bepaalde instellingen in Google Analytics aan te passen, om zo privacyvriendelijk mogelijk te werk te gaan. 
      Naar verwachting zal de Autoriteit Persoonsgegevens een rapport gaan publiceren over de privacyvriendelijkheid van Google Analytics, dat gevolgen kan hebben voor het gebruik ervan. 
      Mocht je gebruik maken van GA4, houd dan de berichtgeving hierover in de gaten en/of overleg met je webdesigner.*
