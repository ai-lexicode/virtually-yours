# _________________________________
# Subcategorieen cookies
# _________________________________
  - note: >
      34. **Subcategorieën cookies:**<br>
      Welke cookies uit deze subcategorieën gebruik je?
    help: >
      Het is geen probleem als je bij vraag 33b analytische cookies of trackingcookies NIET hebt aangevinkt, 
      maar er nu achter komt dat je eigenlijk toch analytische cookies en/of trackingcookies gebruikt omdat je wél 
      cookies uit één van de subcategorieën gebruikt. 
      Je hoeft je antwoord bij vraag 33b niet aan te passen.
    show if:
