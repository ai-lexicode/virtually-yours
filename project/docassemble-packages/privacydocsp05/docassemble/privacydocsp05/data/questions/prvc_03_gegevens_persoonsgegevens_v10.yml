      Wat is je achternaam?
  - field: achternaam_client
    label: >
      9.
# _________________________________
# Schrijfwijze
# _________________________________
  - note: >
      <div style="
        display:block;
        padding:8px;
        border-radius:3px;
        background:#0dcaf0;
        color:#ffffff;
        box-shadow:0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
      ">
        <strong>Schrijfwijze</strong>
      </div>
# 10 | geslacht_client
  - note: >
      10. **Gender:**<br>
      Hoe wil je aangesproken worden in de documenten?
  - field: geslacht_client
    label: >
     10.
    input type: radio
    choices:
      - Vrouwelijk<br>[zij; haar]: Vrouwelijk
      - Mannelijk<br>[hij; hem; zijn]: Mannelijk
      - Neutraal<br>[hij/zij; hem/haar; zijn/haar]: Neutraal
# 11 | formeel_doc
  - note: >
      11. **Formeel of informeel:**<br>
      Wil je een formele (u/uw) of informele (jij/jouw) toon voor de privacy- en/of cookieverklaring?
    help: >
      De autoriteit persoonsgegevens schrijft het volgende:
      <br><br>
      *“De informatie over de gegevensverwerking moet beknopt, transparant en begrijpelijk zijn. Daarom moet u duidelijke en eenvoudige taal gebruiken. 
      Dat betekent onder meer: wees kort en bondig, vermijd vaktermen en verplaats u in de lezer.”*
      <br><br>
      De tekst zelf zal dus enigszins informeel zijn met zo veel mogelijk eenvoudige taal. 
  - field: formeel_doc
    label: >
      11.
    input type: radio
    choices:
      - Informeel *(meest gekozen)*: Informeel
      - Formeel: Formeel 
# _________________________________
# Overig
# _________________________________
  - note: >
      <div style="
        display:block;
        padding:8px;
        border-radius:3px;
        background:#0dcaf0;
        color:#ffffff;
        box-shadow:0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
      ">
        <strong>Overig</strong>
      </div>
# 12 | vragen_prvcpersoonsgegevens
  - note: >
      12. **Opmerkingen:**<br>
      Heb je opmerkingen over bovenstaande vragen en antwoorden?
    help: >
      Plaats alleen opmerkingen die betrekking hebben op de gegeven antwoorden 
      op deze pagina. Op het einde van de vragenlijst is er 
      nog ruimte voor algemene opmerkingen.
  - field: vragen_prvcpersoonsgegevens
    label:
    input type: area
    required: False
under: |
  *Let op, door op `<Terug` te klikken, verlies je mogelijk de hier gegeven antwoorden. 
  Klik op de knop `Verder` om de hier gegeven antwoorden op te slaan.<br><br>*
  *Wil je terug om een eerder gegeven antwoord te wijzigen? 
  Klik dan eerst op de knop `Verder` om de hier gegeven antwoorden op te slaan. 
  Klik daarna in het linkermenu op het pijltje (►) bij de sectie waar je iets wilt wijzigen en vervolgens op de subsectie. 
  Je krijgt dan een overzicht van de door jou gegeven antwoorden in die subsectie te zien en kunt deze wijzigen.*
