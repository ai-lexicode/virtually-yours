# 88 | huisstijl
# _________________________________
  - note: >
      **Huisstijl:**<br>
      De documenten worden *niet* standaard in je eigen huisstijl opgemaakt, maar aangeleverd als Word-files met een witte achtergrond en zwarte letters.
      Je kunt voor de zekerheid de kleuren van je huisstijl hier doorgeven. *(optioneel)*
    help: >
      Geef hier desgewenst de kleurcodes van je huisstijl. 
      Geef bij voorkeur de kleurcodes als hex-code. Hex-codes bestaan uit 6 cijfers of letters en worden voorafgegaan door een '#'. 
      Bijvoorbeeld #000000 staat voor zwart en #ffffff voor wit.
  - field: achtergrondkleur_client
    help: >
      Bijvoorbeeld de kleur die je gebruikt voor de achtergrond van documenten of op de pagina's van je website.
    label: >
      88a. Wat gebruik je als achtergrondkleur?
    input type: area
    required: False
  - field: tekstkleur_client
    help: >
      Bijvoorbeeld de kleur die je gebruikt voor teksten in documenten of teksten op je website.  
    label: >
      88b. Wat gebruik je als tekstkleur?
    input type: area
    required: False
  - field: accentkleur_client
    help: >
      Bijvoorbeeld de kleur die je gebruikt voor titels, kopjes of knoppen op je website of in documenten.    
    label: >
      88c. Wat gebruik je als accentkleur?
    input type: area
    required: False
