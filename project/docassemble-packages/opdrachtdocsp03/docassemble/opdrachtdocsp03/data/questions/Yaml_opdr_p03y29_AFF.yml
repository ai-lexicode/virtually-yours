---
event: kick_out_user
question: |
  Aanmelden of inloggen
subquestion: |
  Als je voor het eerst een vragenlijst gaat starten, registreer je dan eerst via het menu rechtsboven. 
  <br><br>
  Als je verder wilt gaan met een vragenlijst die je eerder bent gestart, log dan in via het menu rechtsboven. 
  Selecteer na het inloggen bij "Mijn interviews" de vragenlijst met je bedrijfsnaam in de titel.
---
initial: True
code: |
  multi_user = True
  if user_logged_in():
    if user_info().email not in respondenten_opdr:
      respondenten_opdr.initializeObject(user_info().email)
    user = respondenten_opdr[user_info().email]
    lets_start
  else:
    kick_out_user
