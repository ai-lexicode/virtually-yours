# _________________________________
# 28 | feedback_ovk
# _________________________________
  - note: >
      28. **Feedback:**<br>
      Wil je iets in je algemene voorwaarden opnemen over 
      een maximale feedbacktermijn en/of een maximaal aantal feedbackrondes voor de opdrachtgever?
    help: >
      Zie ook de vragen die verschijnen als je "Ja" aanvinkt. VVaak ben je voor de uitvoering, 
      voortzetting of afronding van je werkzaamheden afhankelijk van de feedback of goedkeuring van de 
      opdrachtgever. Stel nou dat de opdrachtgever helemaal niks meer van zich laat horen, of juist eindeloos 
      met steeds weer nieuwe aanpassingen en feedback komt, 
      dan is het niet mogelijk om je werkzaamheden uit te voeren, voort te zetten of af te ronden.
  - field: feedback_ovk
    label: >
      28.
    input type: radio
    choices:
      - Ja *(meest gekozen)*: ja
      - Nee: nee  
# _________________________________
# 29| feedbacktermijn_ovk
# _________________________________
  - note: >
      29. **Feedbacktermijn:**<br>
      Binnen hoeveel tijd moet de opdrachtgever maximaal reageren, 
      alvorens je goedkeuring van de opdrachtgever mag aannemen, 
      en/of je werkzaamheden voort mag zetten zonder nadere feedback?
    help: >
      Om te voorkomen dat je geen reactie meer krijgt van je opdrachtgever als iets ter goedkeuring ligt, 
      kun je bijvoorbeeld in je algemene voorwaarden opnemen dat je je werkzaamheden als 
      afgerond/goedgekeurd mag beschouwen, als je je diensten hebt geleverd, 
      maar langer dan een bepaalde periode geen reactie, 
      feedback of goedkeuring van de opdrachtgever hebt ontvangen.
      <br><br>
      Als je hier iets aanvinkt, dan komt dat in de algemene voorwaarden te staan, 
      maar je kunt hier altijd nog afwijkende afspraken over maken met de opdrachtgever. 
      Ook hoef je je natuurlijk niet te beroepen op de maximale feedbacktermijn die staat 
      opgenomen in de algemene voorwaarden. Dat hoeft alleen maar als er bijvoorbeeld een conflict zou ontstaan.
      <br><br>
      Je kunt er ook voor kiezen om dit helemaal weg te laten uit de algemene voorwaarden.
    show if:
      variable: feedback_ovk
      is: ja  
  - field: feedbacktermijn_ovk
    label: >
      29.
    input type: radio
    choices:
      - Ik wil hier niks over opnemen en alleen het aantal feedbackrondes opnemen (zie volgende vraag): nee
      - Binnen een redelijke termijn (ik wil dit niet nader specificeren): een redelijke termijn
      - Na 1 maand zonder reactie: 1 maand
      - Na 2 maanden zonder reactie: 2 maanden
      - Na 3 maanden zonder reactie: 3 maanden
      - Na 6 maanden zonder reactie: 6 maanden
      - Anders / Ik weet het (nog) niet.<br>*(pas later zelf aan in het document)*: "[VUL TERMIJN IN]"
    show if:
      variable: feedback_ovk
      is: ja  
# _________________________________
# 30 | feedbackrondes_ovk
# _________________________________
  - note: >
      30. **Feedbackrondes:**<br>
      Hoeveel feedback- of revisierondes bied je maximaal?
    help: >
      Hoeveel rondes je wilt bieden hangt natuurlijk ook af van het type werkzaamheden. 
      Als je bijvoorbeeld een hele website bouwt voor een opdrachtgever, 
      dan is het niet vreemd dat je daar meer feedbackrondes voor biedt dan wanneer je een blog schrijft.
      <br><br>
      Als je hier iets aanvinkt, dan komt dat in de algemene voorwaarden te staan, 
      maar je kunt hier altijd nog afwijkende afspraken over maken met de opdrachtgever. 
      Ook hoef je je natuurlijk niet te beroepen op het maximale aantal rondes dat staat opgenomen in de algemene voorwaarden.
      Dat hoeft alleen maar als er bijvoorbeeld een conflict zou ontstaan.
      <br><br>
      Je kunt er ook voor kiezen om dit helemaal weg te laten uit de algemene voorwaarden.
    show if:
      variable: feedback_ovk
      is: ja  
  - field: feedbackrondes_ovk
    label: >
      30.
    input type: radio
    choices:
      - Ik wil hier niks over opnemen en alleen de maximale feedbacktermijn opnemen (zie vorige vraag): nee
      - 1 ronde: 1
      - 2 rondes: 2
      - 3 rondes: 3
      - Anders / Ik weet het (nog) niet.<br>*(pas later zelf aan in het document)*: "[VUL AANTAL IN]"
    show if:
      variable: feedback_ovk
      is: ja 
