  Samenwerking
fields:
# _________________________________
# 22 | beschikbaarovo_client
# _________________________________
  - note: >
      22. **Beschikbaarheid:**<br>
      Wil je in de OvO opnemen dat je alleen je beschikbaarheid kunt garanderen 
      als daar afspraken over zijn gemaakt?
    help: >
      In de algemene voorwaarden die ik opstel staat hierover standaard ook een algemene bepaling opgenomen.
      <br><br>
      *Tip:<br>
      Je kunt ervoor kiezen om je beschikbaarheid alleen te garanderen als er een abonnement wordt afgesloten 
      (voor een vast aantal uren per maand). Deze uren reserveer je dan voor de opdrachtgever. 
      Voor de uren die je dan daarnaast op basis van nacalculatie of strippenkaart werkt, kun je aangeven dat je je beschikbaarheid niet kunt garanderen. 
      Dit schept duidelijkheid voor beide partijen, voorkomt teleurstelling als je onverhoopt te druk bent, 
      of de opdrachtgever meer van je vraagt dan je aankunt. Ook kan het de opdrachtgever stimuleren om een abonnement af te sluiten, 
      waardoor je een garantie hebt voor een minimale maandelijkse omzet.*
  - field: beschikbaarovo_client
    label: >
      22.
    input type: radio
    choices:
      - Ja *(meest gekozen)*: ja
      - Nee: nee
# _________________________________
# 23a | bereikbaarovo_client
# _________________________________
  - note: >
      23. **Bereikbaarheid:**<br>
      Wil je in de OvO afspraken vastleggen over wanneer en hoe je te bereiken bent?
    help: >
      In de algemene voorwaarden die ik opstel staat hierover standaard ook een algemene bepaling opgenomen. 
      <br><br>
      Je kunt ervoor kiezen om dit niet expliciet op te nemen in de overeenkomst en dit op z’n beloop te laten, 
      als je verwacht dat bereikbaarheid geen probleem zal zijn. Mocht je vanuit het buitenland in een andere tijdzone werken, 
      dan kan het wel zinvol zijn om hier afspraken over te maken.
  - field: bereikbaarovo_client
    label: >
      23a.
    input type: radio
    choices:
      - Nee *(meest gekozen)*: nee
      - Ja: ja    
