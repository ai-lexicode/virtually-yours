# 25 | Face-to-face kennismaking
# _________________________________
  - note: >
      25. **Face-to-face kennismaking:**<br>
      Iets om over na te denken (geen antwoord nodig hier): Ben je bereid voor een face-to-face kennismaking naar een locatie toe te reizen? 
      Zo ja, hoe wens je de reiskosten en de reistijd in rekening te brengen bij opdrachtgever?
    help: >
      Meestal wordt het eerste kennismakingsgesprek telefonisch of online gedaan. Het kan zijn dat een (potentiële) opdrachtgever 
      je graag daarna een keer face-to-face wil ontmoeten. Je kunt ervoor kiezen om de reiskosten en reistijd als acquisitiekosten 
      te zien en deze niet in rekening te brengen bij de potentiële opdrachtgever. Je kunt er ook voor kiezen om een gereduceerd uurtarief 
      te rekenen voor de reistijd (het is niet heel gebruikelijk om je volledige uurtarief te rekenen voor de reistijd, 
      maar dit kan uiteraard wel als je dat wilt).
      <br><br>
      Het maakt hierbij ook nog uit of het een kennismakingsgesprek is dat wordt ingepland nadat jullie al een samenwerking zijn overeengekomen, 
      of dat het een kennismakingsgesprek is om te kijken of jullie al dan niet willen gaan samenwerken. 
      In dat laatste geval loop je dus het risico dat je reiskosten en -tijd investeert in een kennismaking die uiteindelijk niet resulteert 
      in een opdracht.
      <br><br>
      *Tip:<br>
      Zorg dat je meteen jouw werkwijze op dit gebied communiceert met de (potentiële) opdrachtgever zodra deze aangeeft dat hij/zij een 
      face-to-face kennismaking fijn zou vinden. Het kan anders erg vervelend zijn om achteraf nog aan te geven dat je hier kosten voor in rekening brengt.* 
# _________________________________
# 26 | derden_ovk
# _________________________________
  - note: >
      26. **Uitbesteden aan derden:**<br>
      Wil je de opdracht (deels) aan derden kunnen uitbesteden, zonder dat je hier melding van hoeft te maken bij de opdrachtgever?
    help: >
      *Tip:<br>
      Het kan in bepaalde situaties zinvol zijn om gebruik te maken van de diensten of producten van derde partijen. 
      Misschien kan deze derde partij bepaalde werkzaamheden beter, sneller en goedkoper uitvoeren dan jijzelf. 
      Denk hierbij bijvoorbeeld aan het inschakelen van buitenlandse freelancers via Fiverr of Upwork.*
      <br><br>
      Let op: om de kans op schijnzelfstandigheid te minimaliseren, is het sowieso belangrijk dat je je vrij mag laten vervangen, 
      dus dat je iemand anders mag regelen die in jouw plaats de werkzaamheden uitvoert. Als je je laat vervangen, 
      dan meld je dat altijd van tevoren aan de opdrachtgever en geef je aan wie jouw vervanger is. 
      Dit staat ook als zodanig in de OvO. Deze vraag heeft niet betrekking op vrije vervanging, maar op het (deels) uitbesteden aan derden. 
      Je blijft dan dus zelf de ‘tussenpersoon’ en je opdrachtgever hoeft in principe niet te weten wie werkzaamheden voor jou uitvoert. 
  - field: derden_ovk
    label: >
      26.
    input type: radio
    choices:
      - Ja *(meest gekozen)*: ja
      - Nee: nee
# _________________________________
# 27a | toegangsrechten_ovk
# _________________________________
  - note: >
      27. **Beheerdersrechten:**<br>
      Wil je iets in je algemene voorwaarden opnemen over het intrekken van 
      toegangs-, beheerders- of editorsrechten na verloop van een bepaalde tijd?
    help: >
      In het bijzonder voor Social Media Managers, is het gebruikelijk dat je bepaalde rechten krijgt voor het bewerken van of posten op bepaalde 
      social mediakanalen. Maar dit geldt bijvoorbeeld ook voor toegang tot CRM-systemen, e-mailaccounts of de backend van websites.
      <br><br>
      Soms blijf je deze rechten nog behouden terwijl de overeenkomst al is afgelopen, of als er al geruime tijd geen werkzaamheden meer zijn 
      uitgevoerd voor de opdrachtgever. De opdrachtgever vergeet dan deze rechten weer in te trekken. Dit kan vervelend zijn als je bijvoorbeeld 
      constant meldingen ontvangt van het platform. In uitzonderlijke gevallen vormt het mogelijk ook een beveiligingsrisico als je bijvoorbeeld 
      een account hebt voor een platform, maar niet regelmatig het wachtwoord wijzigt of andere beveiligingsmaatregelen neemt. 
      In sommige gevallen kun je deze rechten zelf intrekken en jezelf verwijderen als beheerder, editor of user, maar soms moet de opdrachtgever dit doen.
      Je kunt hier een standaardperiode voor hanteren. Dat je bijvoorbeeld je rechten zelf intrekt als het gedurende zes maanden of langer niet nodig is 
      geweest het platform te gebruiken ten behoeve van de opdrachtgever, en dat je na zes maanden de opdrachtgever een verzoek zult sturen tot het 
      intrekken van de rechten als je deze zelf niet kunt intrekken.
  - field: toegangsrechten_ovk
    label: >
      27a.
    input type: radio
    choices:
      - Nee *(meest gekozen)*: nee
      - Ja: ja
# _________________________________
