# _________________________________
# 64 | ongebruikteuren_ovk
# _________________________________
  - note: >
      64. **Ongebruikte uren of werkzaamheden meenemen:**<br>
      Kunnen ongebruikte uren of werkzaamheden worden meegenomen naar de volgende maand?
    help: >
      *Tip:<br>
      als je niet gebruikte uren laat meenemen naar de volgende maand, is het verstandig om hier wel een bepaald maximum aan te verbinden. 
      Als je ongebruikte uren maximaal één maand laat meenemen, voorkom je een opeenstapeling van ongebruikte uren en kan het aantal openstaande 
      uren in een maand maximaal tweemaal het overeengekomen maandelijkse aantal uren bedragen. 
      Als je ongebruikte uren maximaal twee maanden laat meenemen kan het aantal openstaande uren oplopen tot driemaal 
      het overeengekomen maandelijkse aantal uren, etc.*
  - field: ongebruikteuren_ovk
    label: >
      64.
    input type: radio
    choices:
      - Dit kan NIET meegenomen worden naar de volgende maand. *(meest gekozen)*: Ongebruikte uren of werkzaamheden kunnen niet meegenomen worden naar de volgende maand
      - Dit kan WEL meegenomen worden naar de volgende maand.: Het is desgewenst mogelijk om ongebruikte uren of werkzaamheden mee te nemen naar de volgende maand
      - Dit kan BEPERKT en uitsluitend in overleg meegenomen worden naar de volgende maand.: Ongebruikte uren of werkzaamheden kunnen beperkt en uitsluitend in overleg worden meegenomen naar de volgende maand
      - Dit kan maximaal 1 MAAND meegenomen worden. In de maand erop worden eerst de meegenomen uren/werkzaamheden opgemaakt en daarna pas de uren/werkzaamheden van die maand.: Ongebruikte uren kunnen maximaal één maand meegenomen worden. In de maand erop worden eerst de meegenomen uren opgemaakt en daarna pas de reguliere uren
      - Dit kan maximaal 1 MAAND meegenomen worden. In de maand erop worden eerst de uren/werkzaamheden van die maand opgemaakt en daarna pas de meegenomen uren/werkzaamheden.: Ongebruikte uren kunnen maximaal één maand meegenomen worden. In de maand erop worden eerst de reguliere uren opgemaakt en daarna pas de meegenomen uren
      - Anders / Ik weet het (nog) niet.<br>*(pas later zelf aan in het document)*: "[SPECIFICEER HOE OM TE GAAN MET ONGEBRUIKTE UREN OF WERKZAAMHEDEN]"
    show if:
      code: |
        facturatiewijze_ovk['abonnement']
