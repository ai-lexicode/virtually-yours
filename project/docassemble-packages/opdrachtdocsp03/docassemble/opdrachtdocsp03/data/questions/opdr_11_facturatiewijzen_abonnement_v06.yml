# 61 | uurbasispakket_ovk
# _________________________________
  - note: >
      61. **Uurbasis of Projectbasis:**<br>
      Werk je met een abonnement op uurbasis (dus een vast aantal uren per maand) of op projectbasis (dus een vast pakket aan werkzaamheden)?
  - field: uurbasispakket_ovk
    label: >
      61.
    input type: radio
    choices:
      - Uurbasis: "[AANTAL UREN]"
      - Vast pakket aan werkzaamheden: "[SPECIFICATIE VAN PAKKET]" 
      - Beide (zowel uurbasis als pakket): "[AANTAL UREN of SPECIFICATIE VAN PAKKET]"
      - Anders / Ik weet het (nog) niet.<br>*(pas later zelf aan in het document)*: "[AANTAL UREN of SPECIFICATIE VAN PAKKET]"
    show if:
      code: |
        facturatiewijze_ovk['abonnement']
