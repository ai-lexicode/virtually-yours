# _________________________________
# 66 | meeruren_ovk
# _________________________________
  - note: >
      66. **Meeruren:**<br>
      Hoe worden meeruren of meerwerk in rekening gebracht?
  - field: meeruren_ovk
    label: >
      66.
    datatype: radio
    choices: 
      - Op basis van nacalculatie *(meest gekozen)*: Meerwerk en/of meeruren worden in rekening gebracht op basis van nacalculatie
      - Door middel van een verhoging van het abonnement voor die maand en alle toekomstige maanden.: Meerwerk en/of meeruren worden in rekening gebracht door middel van een verhoging van het abonnement voor de betreffende maand en alle toekomstige maanden
      - Dit wordt minder gewerkt in de maand erop (de gewerkte uren/werkzaamheden worden dus meegenomen naar de volgende maand).: Meerwerk en/of meeruren worden in de erop volgende maand in mindering gebracht
      - Deze worden niet in rekening gebracht.: niet gefactureerd
      - Anders / Ik weet het (nog) niet.<br>*(pas later zelf aan in het document)*: "[WIJZE WAAROP MEERWERK OF MEERUREN WORDEN GEFACTUREERD]"
    show if:
      code: |
        facturatiewijze_ovk['abonnement']
# _________________________________
# 67 | wijzigingabo_ovk
# _________________________________
  - note: >
      67. **Tussentijdse wijziging**<br>
      Kan het aantal uren en/of de omvang van het pakket aan werkzaamheden tussentijds gewijzigd worden? Zo ja, hoe en welke wijzigingstermijn hanteer je?
    help: >
      Stel dat je een social media content abonnement aanbiedt, waarbij je overeenkomt om 8 posts per maand te maken voor Instagram, voor een vaste prijs. 
      Kan dit dan tussentijds gewijzigd worden naar bijvoorbeeld 4 posts per maand voor een lagere prijs, of naar 12 posts per maand voor een hogere prijs?
      <br><br>
      *Tip:<br>
      je kunt ervoor kiezen om verschillende wijzigingstermijnen te hanteren voor een toename versus een afname van het aantal uren en/of de omvang 
      van de werkzaamheden. Bijvoorbeeld: toename kan in overleg per direct. Voor afname van het aantal uren geldt een opzegtermijn van een maand.*
  - field: wijzigingabo_ovk
    label: >
      67.
    datatype: radio
    choices: 
      - Ja, in onderling overleg ten minste één maand voorafgaand aan de maand waarin de **afname** van het aantal uren in dient te gaan. Een **toename** van het aantal uren kan in overleg per direct ingaan. *(meest gekozen)*: in onderling overleg schriftelijk of per e-mail verlagen, ten minste één maand voorafgaand aan de maand waarin het lagere aantal uren of waarin de afname van de omvang van het pakket aan werkzaamheden in dient te gaan. Een toename van het aantal uren of een toename van de omvang van het pakket aan werkzaamheden kan in overleg per direct ingaan, indien dit schriftelijk of per e-mail is overeengekomen.
      - Nee: niet tussentijds wijzigen, tenzij anders is overeengekomen.
      - Ja, in onderling overleg: in onderling overleg tussentijds schriftelijk of per e-mail wijzigen.
      - Ja, in onderling overleg ten minste één maand voorafgaand aan de maand waarin de wijziging in dient te gaan.: in onderling overleg ten minste één maand voorafgaand aan de maand waarin het gewijzigde aantal uren of de gewijzigde omvang van het pakket aan werkzaamheden in dient te gaan, schriftelijk of per e-mail wijzigen.
      - Anders / Ik weet het (nog) niet.<br>*(pas later zelf aan in het document)*: "[WIJZE WAAROP AANTAL EN/OF OMVANG GEWIJZIGD KAN WORDEN]"
    show if:
      code: |
        facturatiewijze_ovk['abonnement']
