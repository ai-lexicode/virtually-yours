id: id_strippenkaart
# mandatory: True
question: |
  Strippenaart
fields:
# _________________________________
# 74 | geldigstrippenkaart_ovk
# _________________________________
  - note: >
      74. **Geldigheidsduur:**<br>
      Wat is de geldigheidsduur van de strippenkaart?
  - field: geldigstrippenkaart_ovk
    label: >
      74.
    input type: radio
    choices:
      - 3 maanden: 3 maanden
      - 6 maanden *(vaak gekozen)*: 6 maanden
      - 9 maanden: 9 maanden
      - 1 jaar *(vaak gekozen)*: 1 jaar
      - Anders / Ik weet het (nog) niet.<br>*(pas later zelf aan in het document)*: anders
    show if:
      code: |
        facturatiewijze_ovk['strippenkaart']
# _________________________________
# 75a | mingebruikuren_ovk
# _________________________________
  - note: >
      75. **Minimumafname:**<br>
      Hanteer je een minimum maandelijks gebruik?
    help: >
      Bijvoorbeeld, er wordt elke maand ten minste 1 uur aan strippen opgemaakt, 
      ook als er in een maand minder dan 1 uur een beroep op je is gedaan.
  - field: mingebruikuren_ovk
    label: >
      75a.
    input type: radio
    choices:
      - Nee *(meest gekozen)*: nee
      - Ja: ja
    show if:
      code: |
        facturatiewijze_ovk['strippenkaart']
# _________________________________
# 75b | mingebruikaantaluren_ovk
# _________________________________
  - field: mingebruikaantaluren_ovk
    label: >
      75b.<br>
      Zo ja, hoeveel uren worden er maandelijks minimaal verbruikt?
    input type: radio
    choices:
      - Minimaal 1 uur per maand: 1 uur
      - Minimaal 2 uren per maand: 2 uren
      - Minimaal 3 uren per maand: 3 uren
      - Anders / Ik weet het (nog) niet.<br>*(pas later zelf aan in het document)*: anders
    show if:
      variable: mingebruikuren_ovk
      is: ja
# _________________________________
# 76 | vragen_strippenkaart
# _________________________________
  - note: >
      76. **Opmerkingen:**<br>
      Heb je opmerkingen over jouw antwoorden op bovenstaande vragen?
    help: >
      Plaats alleen opmerkingen die betrekking hebben op de gegeven antwoorden 
      op deze pagina. Op het einde van de vragenlijst is er 
      nog ruimte voor algemene opmerkingen.
  - field: vragen_strippenkaart
    label:
    input type: area
    show if:
      code: |
        facturatiewijze_ovk['strippenkaart']
    required: False    
