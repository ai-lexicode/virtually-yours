# 42 | avwbuitentoepassing_ovk
# _________________________________
  - note: >
      42. **Buiten toepassing:**<br>
      Als je GEEN eigen algemene voorwaarden gebruikt, wil je dan eventuele algemene voorwaarden van de opdrachtgever buiten toepassing verklaren?
    show if:
      variable: avwgebruik_ovk
      is: nee
    help: >
      Het kan zijn dat de opdrachtgever wel algemene voorwaarden heeft en deze van toepassing wil laten verklaren op de overeenkomst.
      <br><br>
      *Tip:<br>
      In algemene voorwaarden zijn meestal bepalingen opgenomen over o.a. aansprakelijkheid, Intellectueel eigendom, ontbinding van de overeenkomst, 
      etc. Deze bepaling zijn niet, of slechts gedeeltelijk, opgenomen in de OvO. Mocht je opdrachtgever er akkoord mee gaan dat zijn/haar 
      algemene voorwaarden buiten toepassing worden verklaard of als de opdrachtgever zelf ook geen algemene voorwaarden heeft, 
      dan kun je ervoor kiezen om enkele relevante bepalingen op te nemen in de OvO, zolang je geen algemene voorwaarden hebt. 
      Uiteraard dek je hiermee slechts een beperkt deel van de onderwerpen en risico’s af. Bovendien wordt de overeenkomst hierdoor langer en 
      onoverzichtelijker.*
      <br><br>
      *Tip:<br>
      Idealiter neem je in de OvO alleen zaken op die specifiek voor de opdracht zijn, in combinatie met bepalingen die van belang zijn om 
      schijnzelfstandigheid te voorkomen. Alle andere ‘kleine lettertjes’ die gelden voor jouw werkzaamheden in het algemeen, 
      plaats je dan in de algemene voorwaarden. Zo blijft je OvO kort, bondig en overzichtelijk.*
  - field: avwbuitentoepassing_ovk
    label: >
      42.
    input type: radio
    choices:
      - Ja *(meest gekozen)*: ja
      - Nee: nee
    show if:
        variable: avwgebruik_ovk
        is: nee
# _________________________________
# 43 | akkoord_ovk
# _________________________________
  - note: >
      43. **Akkoord:**<br>
      Hoe wil je dat overeenkomsten tot stand komen *(meerdere opties mogelijk)*?
    help: >
      Voor de rechtsgeldigheid van de overeenkomst is het voldoende als je opdrachtgever een e-mail stuurt waarin deze expliciet aangeeft akkoord te gaan 
      met de overeenkomst. Zorg wel dat duidelijk is om welke overeenkomst het gaat. Dit kan bijvoorbeeld door de opdrachtgever bij de e-mail met het 
      akkoord de overeenkomst als bijlage te laten toevoegen (*“ik ga akkoord met bijgevoegde overeenkomst”*). 
      Maar als je een offerte e-mailt naar een opdrachtgever, en deze stuurt als reply een akkoord, is het ook goed. 
      Het gaat er met andere woorden om dat beide partijen expliciet akkoord gaan met de overeenkomst en dat er geen twijfel kan bestaan over welke 
      overeenkomst het dan zou gaan.
      <br><br>
      Je kunt ook gebruik maken van digitale handtekeningen met behulp van een programma zoals DocuSign, of Signrequest.
      <br><br>
      Als je de overeenkomst aan wilt gaan met handtekeningen, dan moet er een ruimte opgenomen worden in het document waar de handtekeningen geplaatst kunnen worden. 
      Dit komt dan helemaal aan het einde van het document te staan. Het document kan dan per post worden verstuurd, of gescand en gemaild worden.
      <br><br>
      Als je de optie “Anders / Ik weet het (nog) niet” selecteert, dan worden alle drie de opties opgenomen in de overeenkomst van opdracht, en blauw gemarkeerd. 
      Bij het opstellen van een OvO kun je dan weghalen wat voor de betreffende opdracht niet van toepassing is.
  - field: akkoord_ovk
    label: >
      43.
    datatype: checkboxes
    minlength: 1
    choices:
      - Akkoord via e-mail. Er worden geen handtekeningen geplaatst. *(meest gekozen)*: e-mail
      - Via een digitale handtekening: digitaal
      - Schriftelijk (op papier) middels een handtekening: schriftelijk
      - Anders / ik weet het (nog) niet: anders
    none of the above: False
# _________________________________
# 44a | handtekening_ovo
# _________________________________
  - note: >
      44. a. **Handtekening:**<br>
      Wil je dat de overeenkomst van opdracht onderaan voorzien is van een ruimte waar 
      beide partijen hun handtekening kunnen plaatsen?
    help: >
      Als je hier de optie “Ja” selecteert, komt op de laatste pagina van de OvO onderaan een ruimte waar jij en je opdrachtgever een handtekening kunnen plaatsen. 
  - field: handtekening_ovo
    label: >
      44a.
    input type: radio
    choices:
      - Nee, er wordt per e-mail akkoord gegeven op de OvO en er worden geen handtekeningen geplaatst. *(meest gekozen)*: e-mail
      - Ja: ja
      - Nee: nee
# _________________________________
# 44b | paraaf_ovo
# _________________________________
  - note: >
      44. b. **Paraaf:**<br>
      Wil je dat de overeenkomst van opdracht op elke pagina in de footer voorzien is van 
      een ruimte waar beide partijen hun paraaf dienen te plaatsen?
    help: >
      Als je hier de optie “Ja” selecteert, komt er onderaan elke pagina van de OvO een ruimte waar jij en je opdrachtgever een paraaf kunnen zetten.
  - field: paraaf_ovo
    label: >
      44b.
    input type: radio
    choices:
      - Nee, er wordt per e-mail akkoord gegeven op de OvO en er worden geen parafen geplaatst. *(meest gekozen)*: e-mail
      - Ja: ja
      - Nee: nee
