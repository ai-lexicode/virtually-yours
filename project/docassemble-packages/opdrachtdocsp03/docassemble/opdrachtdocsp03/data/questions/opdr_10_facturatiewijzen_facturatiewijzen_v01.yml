id: id_facturatiewijzen
mandatory: True
question: |
  Facturatiewijzen
fields:
# _________________________________
# 59 | facturatiewijze_ovk
# _________________________________
  - note: >
      59. **Facturatiewijze:**<br>
      Welke facturatiewijze(n) hanteer je? *(meerdere opties mogelijk)*
    help: >
      Werk je bijvoorbeeld op basis van een maandelijks abonnement (met een vast aantal uren of met een vast pakket aan werkzaamheden), 
      nacalculatie (dus factureren achteraf op basis van “uurtje-factuurtje” of achteraf per geleverde dienst), een strippenkaart (vooraf ingekochte uren), 
      of een vaste projectprijs?
      <br><br>
      In bepaalde situaties is handig om een vast maandelijks basisbedrag in rekening te brengen (flat fee), 
      en daarbovenop dan op basis van nacalculatie specifiek geleverde diensten te factureren. Bijvoorbeeld als je een telefoonservice aanbiedt. 
      Dan kun je een vaste ‘bereikbaarheidsfee’ in rekening brengen, en daarbovenop kun je een bepaald bedrag rekenen per afgehandeld telefoontje. 
      Of als je werkt op commissiebasis, je factureert een vast abonnementsbedrag voor je sales-diensten, en daar bovenop factureer je een bedrag 
      voor iedere verkoop.
  - field: facturatiewijze_ovk
    label: >
      59.
    datatype: checkboxes
    minlength: 1
    choices:
      - Maandelijks abonnement *(meest gekozen)*: abonnement
      - Nacalculatie *(meest gekozen)*: nacalculatie
      - Strippenkaarten: strippenkaart
      - Vaste projectprijs of pakketprijs: projectprijs
      - Maandelijks basisbedrag (flat fee) + nacalculatie: flatfee
      - Op commissiebasis: commissiebasis
      - Anders / Ik weet het (nog) niet.<br>*(pas later zelf aan in het document)*: anders
    none of the above: False    
