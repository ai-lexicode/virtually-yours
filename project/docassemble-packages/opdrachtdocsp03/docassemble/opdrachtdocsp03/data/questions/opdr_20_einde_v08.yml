#---------------------------------
# SECTIE Antwoorden versturen
#---------------------------------
# _________________________________
# 00 | antwoorden_versturen_opdr
# _________________________________
id: id_inzenden
mandatory: True
question: |
  Antwoorden versturen
subquestion: |
  % if uurbasispakket_ovk and nacalurenwerkzaamheden_ovk and geldigstrippenkaart_ovk and voorafachterafproject_ovk and flatfeenacal_ovk:
  Dit waren alle vragen. Dank je wel voor al je antwoorden!
  <br><br>
  Klik op "Versturen" om je antwoorden in te zenden.

  Mocht je achteraf een wijziging hebben aangebracht in jouw antwoorden, dan dan volgen er hierna mogelijk nog wat aanvullende vragen. Daarna worden je antwoorden verzonden.
  % endif
continue button label: Versturen
continue button field: antwoorden_verstuurd_opdr
#---
progress: 95
section: sec_verstuurd
---
mandatory: True
code: |
  if antwoorden_verstuurd_opdr == True:
    trigger_resubmit = False
---
# _________________________________
# Background task docs
# _________________________________
mandatory: True
code: |
  the_task = background_action('bg_taskdocs')
  log("bg_taskdocs gestart.")
---
#---------------------------------
# SECTIE Documenten creeren
#---------------------------------
id: id_docs
attachments:
# _________________________________
# Gegeven antwoorden
# _________________________________
  - name: Gegeven antwoorden_${ bedrijfsnaam_client }_output
    docx template file: Docassemble_opdr_var_p03v06.docx
    variable name: opdr_varp03v06
    valid formats:
      - docx
# _________________________________
# 00 | avw_vxx
# _________________________________
  - name: Algemene Voorwaarden_${ bedrijfsnaam_client }_output
    docx template file: Docassemble_opdr_avw_v31.docx
    variable name: avw_v31
    valid formats:
      - docx
# _________________________________
# 00 | avw_vxxopg
# _________________________________
  - name: Algemene Voorwaarden_${ bedrijfsnaam_client }_opgemaakt_output
    docx template file: Docassemble_opdr_avw_v31_opgemaakt.docx
    variable name: avw_v31opg
    valid formats:
      - docx
# _________________________________
# 00 | opm_vxx
# _________________________________
  - name: Vragen en opmerkingen_${ bedrijfsnaam_client }_output
    docx template file: Docassemble_opdr_opm_v08.docx
    variable name: opm_v08
    valid formats:
      - docx
# _________________________________
# 00 | ovo_vxx
# _________________________________
  - name: Overeenkomst van Opdracht_${ bedrijfsnaam_client }_output
    docx template file: Docassemble_opdr_ovo_v32.docx
    variable name: ovo_v32
    valid formats:
      - docx
---
#---------------------------------
# CODE E-mails versturen
#---------------------------------
# _________________________________
# 00 | email_sent_ok
# _________________________________
mandatory: True
event: bg_taskdocs
code: |
  email_sent_ok = send_email(to=['info@lexicode.nl'],
       template=resultaten_email,
       attachments=[
         opdr_varp03v06,
         avw_v31,
         avw_v31opg,
         opm_v08,
         ovo_v32
          ]
  )
  background_response()
  log("bg_taskdocs afgerond.")
---
#---------------------------------
# SECTIE Klaar
#---------------------------------
id: id_klaar
mandatory: true
question: |
  Antwoorden verzonden
subquestion: |
  % if antwoorden_verstuurd_opdr:
  Bedankt! Je antwoorden zijn verzonden.
  <br><br>
  **Vervolgstappen:**
  <br>
  <ol>
  <li> Ik stuur je per e-mail een bevestiging dat ik je antwoorden in goede orde heb ontvangen.
  Als je niet binnen enkele dagen een bevestiging van mij ontvangt, neem dan contact met me op via info@virtually-yours.nl.</li>
  <br>
  <li> Aan de hand van jouw antwoorden stel ik de eerste versies van de documenten op.</li>
  <br>
  <li> Ik stuur je zo spoedig mogelijk per e-mail deze eerste versies toe.
  Meestal ontvang je ze binnen twee weken na ontvangst van jouw antwoorden, tenzij we een andere termijn hebben afgesproken.</li>
  </ol>
  Heb je in de tussentijd nog vragen? Neem dan gerust contact met mij op. Je kunt nu afsluiten of je gegeven antwoorden laten e-mailen.
  <br><br>
  Hartelijke groet,
  <br><br>
  Risha
  <br><br>
  **Antwoorden e-mailen (optioneel):**
  <br><br>
  Als je je gegeven antwoorden per e-mail in pdf-formaat wilt ontvangen, klik dan op *Antwoorden e-mailen*.
  % else:
  Het is helaas niet gelukt om je antwoorden te versturen. Neem contact op met webmaster@lexicode.nl
  % endif
right: |
  <br><br><br><br><br><br>[FILE fotorishavy.png]<br>
  *Risha Smeding<br>
  Jurist en Juridisch VA
  info@virtually-yours.nl*
buttons:
  - Afsluiten: leave
    url: https://virtuallyyours.legalwebshop.nl/faq
  - Antwoorden e-mailen: continue
#---
progress: 99
section: sec_klaar
---
id: id_pdfmailen
mandatory: true
question: |
  Jouw antwoorden ontvangen
subquestion: |
  Let op, de e-mail kan in je spamfolder terechtkomen. Het kan een paar minuten duren voordat je de e-mail ontvangt.
  <br><br>
  Deze feature bevindt zich in de testfase.
  Als je de e-mail niet ontvangt, of als je een foutje tegenkomt, dan hoor ik het graag.
fields:
  - Op welk e-mailadres wil je de pdf met gegeven antwoorden ontvangen?: recipient.email
    datatype: email
    default: ${ user_info().email }
