  - error: "Stripe webhooks cannot reach localhost during development"
    solution: "Install Stripe CLI (`brew install stripe/stripe-cli/stripe`), run `stripe listen --forward-to localhost:3001/api/payments/webhook` to forward webhooks locally"
    tier: 1
    promote_candidate: true
    reason: "Universal Stripe integration pattern — applies to any project using Stripe webhooks"
  - error: "LinkedIn OAuth fails with 'unauthorized_scope_error' for openid scope"
    solution: "In Supabase use 'LinkedIn (OIDC)' provider (not legacy 'LinkedIn'). In LinkedIn Developer Portal activate 'Sign In with LinkedIn using OpenID Connect' product"
    tier: 1
    promote_candidate: true
    reason: "Common Supabase + LinkedIn integration gotcha — two providers with same name"

pending_patterns:
  - pattern: "Supabase OAuth redirectTo must match Site URL + Redirect URLs allowlist in Supabase Dashboard"
    context: "Google OAuth redirected to localhost:3000 because Supabase Site URL was still set to localhost. Code used window.location.origin (correct in browser) but Supabase validates against its configured allowlist and falls back to Site URL when no match. Fix: use NEXT_PUBLIC_SITE_URL env var for redirectTo + update Supabase Dashboard Site URL and Redirect URLs."
    promote_candidate: true
    reason: "Universal Supabase OAuth pattern — any project using Supabase social auth will hit this"
  - pattern: "Reuse existing DB columns for provider migration instead of adding new columns"
    context: "Mollie→Stripe migration: reused mollie_payment_id column for Stripe session IDs, avoiding DB migration"
    promote_candidate: false
    reason: "Project-specific shortcut, not a universal best practice"
