name: CI

on:
  push:
    branches: [main, wip]
  pull_request:
    branches: [main]

jobs:
  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for secrets
        run: |
          FOUND=0
          if find . -name ".env" -not -path "*/.git/*" | grep -q .; then
            echo "FAIL: .env file found"
            FOUND=1
          fi
          if grep -rl "-----BEGIN [A-Z ]*PRIVATE KEY-----" --exclude-dir=".git" --exclude-dir="agents" . 2>/dev/null | grep -q .; then
            echo "FAIL: Private key pattern found"
            FOUND=1
          fi
          if grep -rn "AKIA[0-9A-Z]\{16\}" --exclude-dir=".git" . 2>/dev/null | grep -q .; then
            echo "FAIL: AWS key pattern found"
            FOUND=1
          fi
          if [ $FOUND -eq 1 ]; then exit 1; fi
          echo "No secrets found"
