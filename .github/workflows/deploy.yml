name: Deploy

on:
  push:
    branches: [main]
    paths:
      - 'project/**'

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: project/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: project

      - name: Build
        run: npm run build
        working-directory: project
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_SITE_URL: https://virtually-yours.nl

      - name: Package standalone build
        run: |
          mkdir -p deploy
          cp -r project/.next/standalone/. deploy/
          cp -r project/.next/static deploy/.next/static
          cp -r project/public deploy/public
          tar -czf deploy.tar.gz -C deploy .

      - name: Deploy to Hetzner
        env:
          SSH_KEY: ${{ secrets.HETZNER_SSH_KEY }}
          HOST: ${{ secrets.HETZNER_HOST }}
          USER: ${{ secrets.HETZNER_USER }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $HOST >> ~/.ssh/known_hosts 2>/dev/null

          DEPLOY_FILE="deploy-${{ github.sha }}.tar.gz"

          # Upload build with unique name (prevents race condition)
          scp -i ~/.ssh/deploy_key deploy.tar.gz $USER@$HOST:/tmp/$DEPLOY_FILE

          # Deploy on server
          ssh -i ~/.ssh/deploy_key $USER@$HOST << ENDSSH
            set -e
            cd /home/virtually

            # Backup current app
            rm -rf app-old
            cp -r app app-old

            # Extract new build
            cd app
            rm -rf .next node_modules server.js package.json
            tar -xzf /tmp/$DEPLOY_FILE
            rm -f /tmp/$DEPLOY_FILE

            echo "Deploy complete — restarting service..."
          ENDSSH

          # Restart service
          ssh -i ~/.ssh/deploy_key $USER@$HOST "sudo systemctl restart virtually-yours"

          # Health check with rollback
          echo "Waiting for app to start..."
          sleep 5
          for i in 1 2 3 4 5; do
            STATUS=$(ssh -i ~/.ssh/deploy_key $USER@$HOST "curl -sf -o /dev/null -w '%{http_code}' http://localhost:3001/api/health" 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Attempt $i: status $STATUS, retrying..."
            sleep 3
          done

          # Rollback on failure
          echo "Health check failed — rolling back..."
          ssh -i ~/.ssh/deploy_key $USER@$HOST << 'ENDSSH'
            set -e
            cd /home/virtually
            rm -rf app
            cp -r app-old app
            echo "Rollback complete."
          ENDSSH
          ssh -i ~/.ssh/deploy_key $USER@$HOST "sudo systemctl restart virtually-yours"
          echo "Rolled back to previous version."
          exit 1
